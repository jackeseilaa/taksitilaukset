<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuljetuskirja</title>
    <style>
        body { 
            background: #0f0f0f; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            padding-top: 15vh; 
            margin: 0; 
        }
        .btn-fix { 
            background: #fff; 
            color: #000; 
            padding: 25px 50px; 
            border-radius: 50px; 
            font-weight: 900; 
            font-size: 1.4rem; 
            border: 4px solid #c8f050; 
            cursor: pointer;
            box-shadow: 0 0 30px rgba(200, 240, 80, 0.3);
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .btn-fix:disabled { 
            opacity: 0.5; 
            cursor: not-allowed; 
        }
        .btn-fix:active { 
            transform: scale(0.95); 
        }
        #status { 
            margin-top: 30px; 
            color: #c8f050; 
            font-weight: bold; 
            min-height: 1.5em; 
            font-size: 1.1rem; 
        }
        .v-tag { 
            color: #444; 
            font-size: 0.7rem; 
            margin-top: 50px; 
        }
        .spinner { 
            display: inline-block; 
            width: 1em; 
            height: 1em; 
            border: 3px solid #c8f050; 
            border-top-color: transparent; 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
            margin-left: 10px; 
            vertical-align: middle; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: #ff6b6b !important; }
        
        .welcome-container {
            padding: 40px 20px;
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="main-content">
        <h1 style="color: #c8f050; font-size: 2.5rem; margin-bottom: 10px;">KULJETUSKIRJA</h1>
        <p style="margin-bottom: 40px; color: #aaa; letter-spacing: 1px;">iPad Safari -varmistettu väylä</p>

        <button id="startBtn" class="btn-fix">KIRJAUDU TÄSTÄ</button>
        <div id="status">Alustetaan järjestelmää...</div>
        
        <div class="v-tag">Versio 3.0 (Popup-yhteensopivuus & iPad-korjaus)</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Firebase konfiguraatio
        const firebaseConfig = {
            apiKey: "AIzaSyB7Dp5_5fN0Iko-4Jn1D2Dp6NNNih63U0O",
            authDomain: "jsailing-f716c.firebaseapp.com",
            projectId: "jsailing-f716c",
            storageBucket: "jsailing-f716c.firebasestorage.app",
            messagingSenderId: "543523103696",
            appId: "1:543523103696:web:439a312efa6aec398a8fd5"
        };

        // Alustus
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');

        // Kuunnellaan kirjautumistilaa
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("Käyttäjä tunnistettu:", user.email);
                
                if (user.email === "jacke.seilaa@gmail.com") {
                    // PÄÄSY SALLITTU
                    showWelcomePage(user);
                } else {
                    // VÄÄRÄ SÄHKÖPOSTI
                    statusDiv.innerHTML = `<span class="error">Pääsy evätty: ${user.email}</span>`;
                    startBtn.disabled = false;
                    signOut(auth);
                }
            } else {
                statusDiv.innerText = "Valmiina kirjautumiseen";
                startBtn.disabled = false;
            }
        });

        // Kirjautumispainikkeen toiminto
        startBtn.onclick = async (e) => {
            e.preventDefault();
            startBtn.disabled = true;
            statusDiv.innerHTML = "Avataan Google-kirjautuminen<span class='spinner'></span>";
            statusDiv.classList.remove('error');

            try {
                // Käytetään Popupia Redirectin sijaan iPad-yhteensopivuuden vuoksi
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Virhe kirjautuessa:", error);
                startBtn.disabled = false;
                statusDiv.classList.add('error');
                
                if (error.code === 'auth/popup-blocked') {
                    statusDiv.innerText = "Virhe: Selain esti ponnahdusikkunan. Salli ne asetuksista.";
                } else if (error.code === 'auth/cancelled-popup-request') {
                    statusDiv.innerText = "Kirjautuminen keskeytettiin.";
                } else {
                    statusDiv.innerText = "Virhe: " + error.message;
                }
            }
        };

        function showWelcomePage(user) {
            document.getElementById('main-content').innerHTML = `
                <div class="welcome-container">
                    <h1 style="color:#c8f050; font-size: 3rem; margin-bottom: 0;">TERVETULOA</h1>
                    <p style="font-size: 1.4rem; color: #fff; margin-top: 10px;">Jacke, järjestelmä on auki.</p>
                    <p style="color:#666; margin-bottom: 40px;">Kirjautuneena: ${user.email}</p>
                    
                    <button id="finalLink" class="btn-fix" style="background:#c8f050; border-color:#fff;">
                        AVAA TAKSITILAUKSET
                    </button>
                    <br><br>
                    <a href="#" id="logoutBtn" style="color: #666; text-decoration: none; font-size: 0.9rem;">Kirjaudu ulos</a>
                </div>`;

            document.getElementById('finalLink').onclick = () => {
                window.location.href = 'https://jackeseilaa.github.io/taksitilaukset/';
            };

            document.getElementById('logoutBtn').onclick = (e) => {
                e.preventDefault();
                signOut(auth).then(() => location.reload());
            };
        }
    </script>
</body>
</html>
