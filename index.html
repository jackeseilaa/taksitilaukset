<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V17</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 15vh; }
        .v-tag { color: #c8f050; font-weight: bold; border: 1px solid #c8f050; padding: 5px; display: inline-block; margin-bottom: 20px; }
        .btn { 
            display: none; padding: 25px; border-radius: 50px; width: 80%; max-width: 300px;
            font-weight: bold; font-size: 1.2rem; text-decoration: none; margin: 20px auto;
            border: 4px solid #fff; text-transform: uppercase;
        }
        #loginBtn { background: #fff; color: #000; }
        #goBtn { background: #c8f050; color: #000; display: none; }
    </style>
</head>
<body>

    <div class="v-tag">VERSIO 17.0</div>
    <h1 id="stat">ALUSTETAAN...</h1>

    <button id="loginBtn" class="btn">1. KIRJAUDU TÄSTÄ</button>
    
    <a id="goBtn" href="https://jackeseilaa.github.io/taksitilaukset/" class="btn">
       2. AVAA TAKSITILAUKSET
    </a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithRedirect, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        const lBtn = document.getElementById('loginBtn');
        const gBtn = document.getElementById('goBtn');
        const stat = document.getElementById('stat');

        if (user && user.email === "jacke.seilaa@gmail.com") {
            stat.innerText = "TERVETULOA";
            stat.style.color = "#c8f050";
            lBtn.style.display = "none";
            gBtn.style.display = "block"; // Näytetään suora linkki
        } else {
            stat.innerText = "KIRJAUDU SISÄÄN";
            lBtn.style.display = "block";
            gBtn.style.display = "none";
        }
    });

    document.getElementById('loginBtn').onclick = () => {
        signInWithRedirect(auth, new GoogleAuthProvider());
    };
</script>
</body>
</html>
