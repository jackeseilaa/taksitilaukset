        button { background: #c8f050; color: #000; padding: 20px 40px; font-size: 1.2rem; border-radius: 10px; border: none; font-weight: bold; }

<body>

    <h1>KULJETUSKIRJA</h1>
    <p id="info">Paina nappia kirjautuaksesi</p>
    <br>
    <button id="btn">KIRJAUDU SISÄÄN</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithRedirect, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB7Dp5_5fN0Iko-4Jn1D2Dp6NNNih63U0O",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // TÄMÄ ON TÄRKEÄ: Nappi reagoi suoraan klikkaukseen
    document.getElementById('btn').addEventListener('click', () => {
        document.getElementById('info').innerText = "Yhdistetään Googleen...";
        signInWithRedirect(auth, provider);
    });

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "jacke.seilaa@gmail.com") {
            document.body.innerHTML = `<h1>Tervetuloa Jacke!</h1><p>Kirjautuminen onnistui.</p>`;
            // Tähän tulee myöhemmin varsinainen käyttöliittymä, testataan ensin tämä.
        }
    });
</script>
