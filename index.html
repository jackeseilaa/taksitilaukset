<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V15 - STOP LOOP</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 10vh; }
        .box { border: 2px solid #333; padding: 20px; margin: 20px; border-radius: 15px; }
        .btn { 
            display: block; width: 100%; max-width: 300px; margin: 20px auto; 
            padding: 20px; border-radius: 50px; font-weight: bold; font-size: 1.2rem;
            text-decoration: none; cursor: pointer;
        }
        .login { background: #fff; color: #000; }
        .go { background: #c8f050; color: #000; }
        #status { color: #c8f050; font-weight: bold; margin: 20px; }
    </style>
</head>
<body>
    <div style="color:#444; font-size:12px;">VERSIO 15.0</div>
    
    <div class="box">
        <div id="status">ODOTTAA TOIMENPIDETTÄ</div>
        
        <div id="login-part">
            <button onclick="doLogin()" class="btn login">1. KIRJAUDU SISÄÄN</button>
        </div>

        <div id="auth-part" style="display:none;">
            <h2 style="color:#c8f050;">TUNNISTETTU!</h2>
            <a href="https://jackeseilaa.github.io/taksitilaukset/" class="btn go">2. AVAA TAKSITILAUKSET</a>
        </div>
    </div>

    <button onclick="doLogout()" style="background:none; border:none; color:#222; margin-top:50px; text-decoration:underline;">
        Nollaa istunto (Uloskirjaus)
    </button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithRedirect, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "jacke.seilaa@gmail.com") {
            document.getElementById('status').innerText = "KIRJAUTUMINEN OK";
            document.getElementById('auth-part').style.display = "block";
            document.getElementById('login-part').style.display = "none";
        } else {
            document.getElementById('status').innerText = "EI TUNNISTETTU";
            document.getElementById('auth-part').style.display = "none";
            document.getElementById('login-part').style.display = "block";
        }
    });

    window.doLogin = () => {
        const provider = new GoogleAuthProvider();
        signInWithRedirect(auth, provider);
    };

    window.doLogout = () => {
        signOut(auth).then(() => location.reload());
    };
</script>
</body>
</html>
