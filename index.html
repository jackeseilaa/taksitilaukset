<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuljetuskirja</title>
    <style>
        body { 
            background: #0f0f0f; 
            color: #fff; 
            font-family: -apple-system, system-ui, sans-serif; 
            text-align: center; 
            padding-top: 15vh; 
            margin: 0; 
            overflow: hidden;
        }
        .container { padding: 20px; }
        .btn-fix { 
            background: #fff; 
            color: #000; 
            padding: 20px 40px; 
            border-radius: 50px; 
            font-weight: 900; 
            font-size: 1.4rem; 
            border: 4px solid #c8f050; 
            cursor: pointer;
            box-shadow: 0 0 20px rgba(200, 240, 80, 0.2);
            transition: transform 0.1s;
            text-transform: uppercase;
        }
        .btn-fix:active { transform: scale(0.96); }
        .btn-fix:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #status { 
            margin-top: 30px; 
            color: #c8f050; 
            font-weight: bold; 
            font-size: 1.1rem;
        }
        .error { color: #ff6b6b !important; }
        .v-tag { color: #333; font-size: 0.7rem; margin-top: 60px; }
        
        /* Spinner */
        .spinner {
            display: inline-block;
            width: 20px; height: 20px;
            border: 3px solid rgba(200,240,80,.3);
            border-radius: 50%;
            border-top-color: #c8f050;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container" id="app">
    <h1 style="color: #c8f050; font-size: 2.5rem; margin-bottom: 5px;">KULJETUSKIRJA</h1>
    <p style="color: #666; margin-bottom: 40px;">iPad Safari -varmistettu väylä</p>

    <div id="ui-login">
        <button id="startBtn" class="btn-fix">KIRJAUDU TÄSTÄ</button>
        <div id="status">Alustetaan...</div>
    </div>

    <div id="ui-authenticated" style="display: none;">
        <h2 style="color: #c8f050;">TERVETULOA JACKE</h2>
        <p id="userEmail" style="color: #aaa;"></p>
        <button id="finalLink" class="btn-fix" style="background: #c8f050;">AVAA TAKSITILAUKSET</button>
        <br><br>
        <button onclick="location.reload()" style="background:none; border:none; color:#444; cursor:pointer;">Kirjaudu ulos</button>
    </div>

    <div class="v-tag">Versio 4.0 (Stabiloitu yhteys)</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB7Dp5_5fN0Iko-4Jn1D2Dp6NNNih63U0O",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    // Alustus
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');
    const loginUI = document.getElementById('ui-login');
    const authUI = document.getElementById('ui-authenticated');

    // Tarkistetaan tila heti
    onAuthStateChanged(auth, (user) => {
        if (user) {
            if (user.email === "jacke.seilaa@gmail.com") {
                loginUI.style.display = 'none';
                authUI.style.display = 'block';
                document.getElementById('userEmail').innerText = user.email;
            } else {
                status.innerHTML = `<span class="error">Pääsy evätty: ${user.email}</span>`;
                startBtn.disabled = false;
            }
        } else {
            status.innerText = "Valmiina.";
            startBtn.disabled = false;
        }
    });

    // Kirjautumispainike
    startBtn.onclick = async () => {
        startBtn.disabled = true;
        status.innerHTML = "Odotetaan Googlea... <div class='spinner'></div>";
        
        try {
            // Popup on Safari-laitteilla luotettavin jos Authorized Domains on kunnossa
            await signInWithPopup(auth, provider);
        } catch (error) {
            console.error(error);
            startBtn.disabled = false;
            status.classList.add('error');
            
            if (error.code === 'auth/popup-blocked') {
                status.innerText = "Virhe: Selain esti ikkunan. Salli ponnahdusikkunat.";
            } else {
                status.innerText = "Virhe: " + error.code;
            }
        }
    };

    // Siirtyminen taksitilauksiin
    document.getElementById('finalLink').onclick = () => {
        window.location.href = "https://jackeseilaa.github.io/taksitilaukset/";
    };

</script>

</body>
</html>
