<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuljetuskirja PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0f0f; --surface: #1a1a1a; --border: #2e2e2e; --accent: #c8f050; --accent2: #50c8f0; --text: #f0f0f0; --muted: #888; --danger: #f05050; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { font-family: 'Syne', sans-serif; font-size: 1.5rem; color: var(--accent); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 15px; min-height: 120px; outline: none; font-size: 0.9rem; margin-bottom: 10px; }
        button { font-family: 'Syne', sans-serif; font-weight: 700; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: #000; width: 100%; }
        .btn-login { background: #fff; color: #000; font-size: 1rem; padding: 15px 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.8rem; }
        th { text-align: left; color: var(--accent2); padding: 12px; border-bottom: 2px solid var(--border); text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #222; }
        #auth-section { text-align: center; margin-top: 100px; }
        #app-content { display: none; }
    </style>
</head>
<body>

<div id="auth-section">
    <h1>KULJETUSKIRJA</h1>
    <p style="color: var(--muted); margin: 20px 0;">Kirjaudu sisään hallinnoidaksesi ajoja.</p>
    <button class="btn-login" id="btnLogin">KIRJAUDU GOOGLELLA</button>
</div>

<div id="app-content">
    <header>
        <h1>KULJETUSKIRJA</h1>
        <button id="btnLogout" style="background:none; color:var(--muted); border:1px solid var(--border); font-size:0.7rem;">ULOS</button>
    </header>

    <div class="card">
        <textarea id="msgInput" placeholder="Liitä WhatsApp-viesti tähän..."></textarea>
        <button class="btn-primary" id="btnAdd">LISÄÄ LISTAAN</button>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Pvm</th>
                    <th>Klo</th>
                    <th>Reitti</th>
                    <th>€</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithRedirect, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Asetukset kuviesi perusteella
    const firebaseConfig = {
        apiKey: "AIzaSyB7Dp5_5fN0Iko-4Jn1D2Dp6NNNih63U0O",
        authDomain: "jsailing-f716c.firebaseapp.com", 
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Kirjautumisen hallinta
    document.getElementById('btnLogin').onclick = () => signInWithRedirect(auth, provider);
    document.getElementById('btnLogout').onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        // Varmistetaan sähköposti sääntöjen mukaisesti
        if (user && user.email === "jacke.seilaa@gmail.com") {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            startListening();
        } else if (user) {
            alert("Pääsy vain jacke.seilaa@gmail.com");
            signOut(auth);
        }
    });

    function startListening() {
        const q = query(collection(db, "taksitulot"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';
            snapshot.forEach(d => {
                const r = d.data();
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${r.date || ''}</td>
                    <td>${r.time || ''}</td>
                    <td><div style="font-size:0.7rem; color:var(--muted)">${r.from}</div>${r.to}</td>
                    <td style="color:var(--accent); font-weight:bold;">${r.price}€</td>
                    <td><button onclick="window.del('${d.id}')" style="background:none; color:var(--danger)">✕</button></td>
                `;
                tbody.appendChild(tr);
            });
        });
    }

    document.getElementById('btnAdd').onclick = async () => {
        const text = document.getElementById('msgInput').value;
        if(!text) return;
        
        const lines = text.split('\n').map(l => l.trim());
        const data = {
            date: text.match(/(\d{1,2})\.(\d{1,2})/)?.[0] || new Date().toLocaleDateString('fi-FI'),
            time: text.match(/(\d{1,2})[.:](\d{2})/)?.[0] || '',
            from: lines.find(l => l.toLowerCase().includes('lähtö'))?.replace(/lähtö/i, '').trim() || '?',
            to: lines.find(l => l.toLowerCase().includes('meno') || l.toLowerCase().includes('kohde'))?.replace(/meno|kohde/i, '').trim() || '?',
            price: text.match(/(\d+)\s*[€eE]/)?.[1] || '0',
            createdAt: new Date()
        };
        
        await addDoc(collection(db, "taksitulot"), data);
        document.getElementById('msgInput').value = '';
    };

    window.del = (id) => confirm("Poistetaanko rivi?") && deleteDoc(doc(db, "taksitulot", id));
</script>
</body>
</html>
