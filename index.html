<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V16 - FIXED</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 15vh; }
        .container { padding: 20px; max-width: 400px; margin: auto; }
        .btn { 
            display: none; width: 100%; padding: 25px; border-radius: 50px; 
            font-weight: 900; font-size: 1.4rem; text-decoration: none; border: 4px solid #fff;
            margin-top: 20px; cursor: pointer; text-transform: uppercase;
        }
        #loginBtn { background: #fff; color: #000; border-color: #c8f050; }
        #goBtn { background: #c8f050; color: #000; }
        #status { color: #c8f050; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }
        .v { color: #222; font-size: 12px; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="status">Tarkistetaan...</div>
        
        <button id="loginBtn" class="btn">Kirjaudu Sisään</button>
        <a id="goBtn" href="https://jackeseilaa.github.io/taksitilaukset/" class="btn">Avaa Taksitilaukset</a>

        <div class="v">VERSIO 16.0</div>
        <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:#111; margin-top:40px; font-size:10px;">Nollaa muisti</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithRedirect, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const lBtn = document.getElementById('loginBtn');
    const gBtn = document.getElementById('goBtn');
    const stat = document.getElementById('status');

    // 1. Tarkistetaan heti selaimen omasta muistista
    if (localStorage.getItem('isLogged') === 'true') {
        stat.innerText = "TERVETULOA TAKAISIN";
        gBtn.style.display = "block";
    } else {
        lBtn.style.display = "block";
        stat.innerText = "TUNNISTAUTUMINEN VAADITAAN";
    }

    // 2. Päivitetään tila Firebasesta taustalla
    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "jacke.seilaa@gmail.com") {
            localStorage.setItem('isLogged', 'true');
            stat.innerText = "PÄÄSY SALLITTU";
            lBtn.style.display = "none";
            gBtn.style.display = "block";
        } else {
            // Jos ei ole käyttäjää, ei tyhjennetä muistia heti (estää vilkkumisen)
            if (!localStorage.getItem('isLogged')) {
                stat.innerText = "KIRJAUDU SISÄÄN";
                lBtn.style.display = "block";
            }
        }
    });

    lBtn.onclick = () => {
        stat.innerText = "SIIRRYTÄÄN GOOGLEEN...";
        signInWithRedirect(auth, new GoogleAuthProvider());
    };
</script>
</body>
</html>
