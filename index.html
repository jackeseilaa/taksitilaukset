<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuljetuskirja</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: sans-serif; text-align: center; padding-top: 20vh; margin: 0; }
        .btn-fix { 
            background: #fff; color: #000; padding: 20px 40px; 
            border-radius: 50px; font-weight: 900; font-size: 1.2rem; 
            border: 4px solid #c8f050; cursor: pointer; text-decoration: none;
            display: inline-block; box-shadow: 0 0 20px rgba(200, 240, 80, 0.4);
            transition: transform 0.1s;
        }
        .btn-fix:active { transform: scale(0.95); }
        #status { margin-top: 30px; color: #888; font-family: monospace; font-size: 0.9rem; padding: 0 20px; }
        .loader { display: inline-block; width: 18px; height: 18px; border: 3px solid #c8f050; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-left: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h1 style="color: #c8f050; font-size: 2.5rem; margin-bottom: 10px;">KULJETUSKIRJA</h1>
    <p style="margin-bottom: 40px; color: #aaa;">iPad-yhteys varmistettu</p>

    <button id="startBtn" class="btn-fix">KIRJAUDU TÄSTÄ</button>

    <div id="status">Tila: Odottaa klikkausta</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // PÄIVITETTY KONFIGURAATIO UUDELLA AVAIMELLA
    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    provider.setCustomParameters({ 
        prompt: 'select_account'
    });

    // Kirjautumispainikkeen toiminto
    document.getElementById('startBtn').onclick = (e) => {
        e.preventDefault();
        document.getElementById('status').innerHTML = "Avataan väylää<span class='loader'></span>";
        
        // signInWithPopup on varmempi iPadilla kuin Redirect
        signInWithPopup(auth, provider)
            .then((result) => {
                console.log("Kirjautuminen onnistui:", result.user.email);
                handleUserLogin(result.user);
            })
            .catch((error) => {
                console.error("Virhe koodi:", error.code);
                if (error.code === 'auth/popup-blocked') {
                    document.getElementById('status').innerText = "⚠️ Salli ponnahdusikkunat selaimen asetuksista.";
                } else if (error.code === 'auth/api-key-not-valid') {
                    document.getElementById('status').innerText = "⚠️ API-avain aktivoituu... Odota minuutti ja päivitä sivu.";
                } else {
                    document.getElementById('status').innerText = "Virhe: " + error.message;
                }
            });
    };

    // Tarkistetaan onko käyttäjä jo sisällä (esim. sivun latautuessa uudelleen)
    onAuthStateChanged(auth, (user) => {
        if (user) {
            if (user.email === "jacke.seilaa@gmail.com") {
                handleUserLogin(user);
            } else {
                document.body.innerHTML = `
                    <div style="padding: 50px; text-align: center;">
                        <h1 style="color:#ff6b6b">PÄÄSY EVÄTTY</h1>
                        <p>Käyttäjä: ${user.email}</p>
                        <p>Sinulla ei ole oikeuksia tähän sovellukseen.</p>
                        <button onclick="auth.signOut().then(() => location.reload())" style="padding:10px; margin-top:20px; cursor:pointer;">KIRJAUDU ULOS</button>
                    </div>`;
            }
        }
    });

    function handleUserLogin(user) {
        document.body.innerHTML = `
            <div style="padding: 50px; text-align: center;">
                <h1 style="color:#c8f050">PÄÄSY SALLITTU</h1>
                <p>Tervetuloa takaisin, Jacke.</p>
                <p style="font-size: 0.9rem; color: #888;">${user.email}</p>
                <div style="margin-top:30px;">
                    <button onclick="location.href='/tilaukset/'" style="padding:15px 30px; background:#c8f050; color:#000; border:none; border-radius:10px; cursor:pointer; font-weight:bold; font-size:1.1rem;">AVAA LISTA</button>
                </div>
            </div>`;
    }
</script>

</body>
</html>
