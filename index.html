<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V19 - MANUAL ONLY</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 20vh; margin: 0; }
        .v-badge { color: #333; font-size: 12px; margin-bottom: 10px; }
        #status { color: #c8f050; font-size: 1.8rem; font-weight: bold; margin-bottom: 30px; }
        
        /* Vain yksi nappi kerrallaan näkyvissä */
        .btn { 
            display: none; width: 85%; max-width: 350px; padding: 25px; 
            border-radius: 50px; font-weight: 900; font-size: 1.4rem; 
            text-decoration: none; margin: 0 auto; border: 4px solid #fff; 
            text-transform: uppercase; cursor: pointer;
        }
        #loginBtn { background: #fff; color: #000; }
        #goBtn { background: #c8f050; color: #000; }
    </style>
</head>
<body>
    <div class="v-badge">VERSIO 19.0</div>
    <div id="status">ALUSTETAAN...</div>

    <button id="loginBtn" class="btn">1. KIRJAUDU SISÄÄN</button>

    <a id="goBtn" href="https://jackeseilaa.github.io/taksitilaukset/" class="btn">
        2. AVAA TILAUSET TÄSTÄ
    </a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithRedirect, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        const lBtn = document.getElementById('loginBtn');
        const gBtn = document.getElementById('goBtn');
        const stat = document.getElementById('status');

        if (user && user.email === "jacke.seilaa@gmail.com") {
            stat.innerText = "TUNNISTETTU OK";
            lBtn.style.display = "none";
            gBtn.style.display = "block"; // Aktivoi vihreä nappi
        } else {
            stat.innerText = "ODOTTAA KIRJAUTUMISTA";
            lBtn.style.display = "block";
            gBtn.style.display = "none";
        }
    });

    document.getElementById('loginBtn').onclick = () => {
        signInWithRedirect(auth, new GoogleAuthProvider());
    };
</script>
</body>
</html>
