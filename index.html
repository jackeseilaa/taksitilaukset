<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V14 - AUTO</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 20vh; }
        .v { color: #333; font-size: 12px; }
        #msg { color: #c8f050; font-size: 1.5rem; font-weight: bold; }
        .loading-bar { width: 100px; height: 4px; background: #c8f050; margin: 20px auto; animation: load 2s infinite; }
        @keyframes load { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body>
    <div class="v">VERSIO 14.0 (AUTO-JUMP)</div>
    <div id="msg">TARKISTETAAN PÄÄSYÄ...</div>
    <div class="loading-bar"></div>

    <div id="manual" style="display:none; margin-top:50px;">
        <button onclick="location.href='https://jackeseilaa.github.io/taksitilaukset/'" style="padding:20px; background:#fff; border-radius:10px;">
            KLIKKAA TÄSTÄ JOS EI SIIRRY
        </button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithRedirect, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "jacke.seilaa@gmail.com") {
            document.getElementById('msg').innerText = "TERVETULOA. SIIRRYTÄÄN...";
            // PAKOTETTU SIIRTO
            window.location.replace("https://jackeseilaa.github.io/taksitilaukset/");
            
            // Varmistus jos replace pettää
            setTimeout(() => {
                window.location.href = "https://jackeseilaa.github.io/taksitilaukset/";
                document.getElementById('manual').style.display = "block";
            }, 1000);
            
        } else if (!user) {
            document.getElementById('msg').innerText = "KIRJAUDUTAAN SISÄÄN...";
            signInWithRedirect(auth, new GoogleAuthProvider());
        } else {
            document.getElementById('msg').innerText = "EI PÄÄSYÄ.";
        }
    });
</script>
</body>
</html>
