<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuljetuskirja</title>
    <style>
        body { 
            background: #0f0f0f; 
            color: #fff; 
            font-family: -apple-system, system-ui, sans-serif; 
            text-align: center; 
            padding-top: 15vh; 
            margin: 0;
        }
        .container { padding: 20px; }
        .btn-fix { 
            background: #fff; 
            color: #000; 
            padding: 22px 45px; 
            border-radius: 50px; 
            font-weight: 900; 
            font-size: 1.3rem; 
            border: 4px solid #c8f050; 
            cursor: pointer;
            box-shadow: 0 0 25px rgba(200, 240, 80, 0.2);
            transition: transform 0.1s, background 0.2s;
            text-transform: uppercase;
        }
        .btn-fix:active { transform: scale(0.96); }
        .btn-fix:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #status { 
            margin-top: 30px; 
            color: #c8f050; 
            font-weight: bold; 
            font-size: 1.1rem;
            min-height: 1.5em;
        }
        .error { color: #ff6b6b !important; }
        .v-tag { color: #333; font-size: 0.7rem; margin-top: 60px; }
        
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 3px solid rgba(200,240,80,.3);
            border-radius: 50%;
            border-top-color: #c8f050;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #ui-authenticated { display: none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #c8f050; font-size: 2.5rem; margin-bottom: 5px;">KULJETUSKIRJA</h1>
    <p style="color: #666; margin-bottom: 40px; letter-spacing: 1px;">iPad Safari -varmistettu väylä</p>

    <div id="ui-login">
        <button id="startBtn" class="btn-fix">KIRJAUDU TÄSTÄ</button>
        <div id="status">Alustetaan...</div>
    </div>

    <div id="ui-authenticated">
        <h2 style="color: #c8f050; font-size: 2rem;">TERVETULOA JACKE</h2>
        <p id="userEmail" style="color: #aaa; margin-bottom: 30px;"></p>
        <button id="finalLink" class="btn-fix" style="background: #c8f050;">AVAA TAKSITILAUKSET</button>
        <br><br>
        <button onclick="logout()" style="background:none; border:none; color:#444; cursor:pointer; text-decoration:underline; margin-top:20px;">Kirjaudu ulos</button>
    </div>

    <div class="v-tag">Versio 5.0 (Uusi API-avain päivitetty)</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // ✅ PÄIVITETTY KONFIGURAATIO
    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs", 
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');
    const loginUI = document.getElementById('ui-login');
    const authUI = document.getElementById('ui-authenticated');

    // Tarkkaillaan kirjautumistilaa
    onAuthStateChanged(auth, (user) => {
        if (user) {
            if (user.email === "jacke.seilaa@gmail.com") {
                loginUI.style.display = 'none';
                authUI.style.display = 'block';
                document.getElementById('userEmail').innerText = user.email;
            } else {
                status.innerHTML = `<span class="error">Pääsy evätty: ${user.email}</span>`;
                startBtn.disabled = false;
                // Kirjataan väärä käyttäjä heti ulos
                signOut(auth);
            }
        } else {
            loginUI.style.display = 'block';
            authUI.style.display = 'none';
            status.innerText = "Valmiina.";
            startBtn.disabled = false;
        }
    });

    // Kirjautumisen aloitus
    startBtn.onclick = async () => {
        startBtn.disabled = true;
        status.innerHTML = "Avataan Googlea... <div class='spinner'></div>";
        status.classList.remove('error');
        
        try {
            await signInWithPopup(auth, provider);
        } catch (error) {
            console.error("Virhe:", error.code);
            startBtn.disabled = false;
            status.classList.add('error');
            
            if (error.code === 'auth/popup-blocked') {
                status.innerText = "Virhe: Selain esti ikkunan. Salli ponnahdusikkunat Safarin asetuksista.";
            } else if (error.code === 'auth/cancelled-popup-request') {
                status.innerText = "Kirjautuminen peruttu.";
            } else {
                status.innerText = "Virhe: " + error.code;
            }
        }
    };

    // Siirtyminen sovellukseen
    document.getElementById('finalLink').onclick = () => {
        window.location.href = "https://jackeseilaa.github.io/taksitilaukset/";
    };

    // Uloskirjautuminen globaalina funktiona
    window.logout = () => {
        signOut(auth).then(() => {
            location.reload();
        });
    };

</script>

</body>
</html>
