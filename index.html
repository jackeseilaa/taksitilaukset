<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuljetuskirja V35.2</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0f0f; --surface: #1a1a1a; --border: #2e2e2e; --accent: #c8f050; --accent2: #50c8f0; --text: #f0f0f0; --muted: #666; --edit: #f0a050; --future-bg: #d4f8a0; --future-text: #000000; --price-text: #0044ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); padding: 10px; }
        .v-tag { color: var(--muted); font-size: 10px; text-align: center; margin-bottom: 5px; }
        h1 { font-family: 'Syne', sans-serif; font-size: 1.2rem; text-align: center; color: var(--accent); margin-bottom: 15px; text-transform: uppercase; }
        textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px; font-family: inherit; margin-bottom: 10px; min-height: 100px; font-size: 0.9rem; border-left: 4px solid var(--accent); }
        .manual-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; background: #222; padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .manual-fields input { background: #000; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px; font-family: inherit; font-size: 0.85rem; width: 100%; }
        .full-width { grid-column: span 2; }
        label { font-size: 0.6rem; color: var(--accent2); text-transform: uppercase; margin-bottom: 2px; display: block; }
        .btn-add { background: var(--accent); color: black; width: 100%; padding: 18px; border-radius: 8px; font-weight: 800; border: none; margin-bottom: 15px; cursor: pointer; font-size: 1.1rem; }
        .table-wrapper { overflow-x: auto; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; min-width: 950px; }
        th { text-align: left; color: var(--accent2); padding: 12px; border-bottom: 1px solid var(--border); background: #222; }
        td { padding: 12px; border-bottom: 1px solid #222; vertical-align: top; }
        .row-future { background-color: var(--future-bg) !important; color: var(--future-text) !important; }
        .price-tag { font-weight: bold; color: var(--price-text); border: 1px solid rgba(0,68,255,0.4); padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.2); }
        .action-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--accent2); padding: 4px; }
    </style>
</head>
<body>
    <div class="v-tag">VERSIO 35.2 (DATA CLEANUP)</div>

    <div id="app-content">
        <h1>KULJETUSKIRJA</h1>
        <textarea id="msgInput" placeholder="Liitä viesti tähän..." oninput="parseMessage()"></textarea>
        
        <div class="manual-fields">
            <div><label>Pvm</label><input type="text" id="inPvm"></div>
            <div><label>Klo</label><input type="text" id="inKlo"></div>
            <div><label>Hinta (€)</label><input type="text" id="inHinta"></div>
            <div><label>Tyyppi</label><input type="text" id="inTyyppi"></div>
            <div class="full-width"><label>Lähtö</label><input type="text" id="inFrom"></div>
            <div class="full-width"><label>Meno</label><input type="text" id="inTo"></div>
            <div class="full-width"><label>Asiakas</label><input type="text" id="inNimi"></div>
            <div class="full-width"><label>Huomio</label><input type="text" id="inHuomio"></div>
            <div class="full-width"><label>Lasku / Maksu</label><input type="text" id="inLasku"></div>
        </div>

        <button class="btn-add" id="btnSave">TALLENNA TILAUS</button>

        <div class="table-wrapper">
            <table>
                <thead><tr><th>Aika</th><th>Reitti</th><th>Asiakas</th><th>Hinta</th><th>Lasku</th><th>Huomio</th><th></th></tr></thead>
                <tbody id="logs"></tbody>
            </table>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs", authDomain: "jsailing-f716c.firebaseapp.com", projectId: "jsailing-f716c", storageBucket: "jsailing-f716c.firebasestorage.app", appId: "1:543523103696:web:439a312efa6aec398a8fd5" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentLogs = [];
    let editId = null;

    onAuthStateChanged(auth, (u) => { if(u) startListening(); else signInWithPopup(auth, provider); });

    window.parseMessage = () => {
        if (editId) return;
        const txt = document.getElementById('msgInput').value;
        const lines = txt.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        
        // PVM, KLO & HINTA
        let pvmM = txt.match(/(\d{1,2})\.(\d{1,2})/);
        if (pvmM) document.getElementById('inPvm').value = pvmM[0].includes('2026') ? pvmM[0] : pvmM[0] + ".2026";
        document.getElementById('inKlo').value = txt.match(/(\d{1,2})[.:](\d{2})/)?.[0] || "";
        
        const hintaMatch = txt.match(/(\d{1,3})\s*[e€]/i);
        const hintaVal = hintaMatch ? hintaMatch[1] : "";
        document.getElementById('inHinta').value = hintaVal;
        document.getElementById('inTyyppi').value = txt.toLowerCase().includes('vip') ? 'VIP' : 'Normaali';
        
        // REITIT
        const fIdx = lines.findIndex(l => l.toLowerCase().match(/lähtö|nouto/));
        const fromV = (fIdx !== -1) ? lines[fIdx+1] : "";
        document.getElementById('inFrom').value = fromV;
        const tIdx = lines.findIndex(l => l.toLowerCase().match(/meno|kohde/));
        const toV = (tIdx !== -1) ? lines[tIdx+1] : "";
        document.getElementById('inTo').value = toV;
        
        // NIMI & NUMERO (Puhdistus hinta-osasta)
        const nIdx = lines.findIndex(l => l.toLowerCase().match(/kyytiin|tilaaja/));
        let rawNameLine = (nIdx !== -1) ? lines[nIdx+1] : "";
        let cleanName = rawNameLine.replace(/[\/]/g, '').replace(/\+?\d[\d\s-]{7,}/, '').trim();
        document.getElementById('inNimi').value = cleanName;

        // LASKU
        const bIdx = lines.findIndex(l => l.toLowerCase().includes('lasku'));
        let billVal = "—";
        if (bIdx !== -1 && lines[bIdx+1] && !lines[bIdx+1].toLowerCase().includes('ok?')) {
            billVal = lines[bIdx+1];
        }
        document.getElementById('inLasku').value = billVal;

        // HUOMIO (Tiukka suodatus: poista numero, hinta ja nimi)
        let ignoredLines = [fromV, toV, rawNameLine, billVal];
        let notes = lines.filter(l => 
            !ignoredLines.includes(l) && 
            !l.toLowerCase().match(/lähtö|meno|kyytiin|lasku|huomenna|klo|ok\?/) &&
            !l.match(/(\d{1,2})\.(\d{1,2})/) &&
            l.length > 3
        ).join(' ');

        // Siivotaan loput turhat tiedot pois
        notes = notes.replace(new RegExp(cleanName, 'gi'), '') // Poista nimi
                     .replace(/\d{1,3}\s*[e€]/gi, '')         // Poista hinta esim "70e"
                     .replace(/\+?\d[\d\s-]{7,}/g, '')        // Poista puhelinnumerot
                     .replace(/vip/gi, '')                    // Poista "vip"
                     .replace(/\//g, '')                      // Poista vinoviivat
                     .replace(/\s\s+/g, ' ')                  // Poista ylimääräiset välit
                     .trim();

        document.getElementById('inHuomio').value = notes;
    };

    function startListening() {
        onSnapshot(query(collection(db, "taksitulot")), (snap) => {
            const tbody = document.getElementById('logs');
            tbody.innerHTML = '';
            currentLogs = snap.docs.map(d => ({id: d.id, ...d.data()}));
            currentLogs.sort((a,b) => {
                const k = (i) => {
                    let p = (i.date || '01.01.2026').split('.');
                    return `${p[2]||'2026'}-${(p[1]||'01').padStart(2,'0')}-${(p[0]||'01').padStart(2,'0')}-${(i.time||'00:00').replace('.',':')}`;
                };
                return k(b).localeCompare(k(a));
            });
            currentLogs.forEach(r => {
                const tr = document.createElement('tr');
                tr.className = 'row-future';
                // Puhdistetaan hinta pois puhelinnumeron perästä listassa
                let displayPhone = (r.phone || '').replace(r.price, '').trim();
                
                tr.innerHTML = `
                    <td><b>${r.date || ''}</b><br>${r.time || ''}</td>
                    <td><small>N:</small> ${r.from || '—'}<br><small>K:</small> ${r.to || '—'}</td>
                    <td>${r.customer || '—'}<br><small>${displayPhone}</small></td>
                    <td><span class="price-tag">${r.price || '0'}€</span><br><small>${r.type || ''}</small></td>
                    <td>${r.billing || '—'}</td>
                    <td><small>${r.notes || ''}</small></td>
                    <td>
                        <button class="action-btn" onclick="window.prepareEdit('${r.id}')">✎</button>
                        <button class="action-btn" onclick="window.del('${r.id}')">✕</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        });
    }

    window.prepareEdit = (id) => {
        const item = currentLogs.find(l => l.id === id);
        if(!item) return;
        editId = id;
        document.getElementById('inPvm').value = item.date;
        document.getElementById('inKlo').value = item.time;
        document.getElementById('inHinta').value = item.price;
        document.getElementById('inTyyppi').value = item.type;
        document.getElementById('inFrom').value = item.from;
        document.getElementById('inTo').value = item.to;
        document.getElementById('inNimi').value = item.customer;
        document.getElementById('inHuomio').value = item.notes;
        document.getElementById('inLasku').value = item.billing;
        window.scrollTo(0,0);
    };

    document.getElementById('btnSave').onclick = async () => {
        const txt = document.getElementById('msgInput').value;
        const hinta = document.getElementById('inHinta').value;
        let rawPhone = txt.match(/(\+?\d[\d\s-]{8,15})/)?.[0] || '—';
        // Varmistetaan että puhelinnumeroon ei tallenneta hintaa
        let cleanPhone = rawPhone.replace(hinta, '').trim();

        const data = {
            date: document.getElementById('inPvm').value,
            time: document.getElementById('inKlo').value,
            price: hinta,
            type: document.getElementById('inTyyppi').value,
            from: document.getElementById('inFrom').value,
            to: document.getElementById('inTo').value,
            customer: document.getElementById('inNimi').value,
            billing: document.getElementById('inLasku').value,
            notes: document.getElementById('inHuomio').value,
            phone: editId ? (currentLogs.find(l => l.id === editId)?.phone || '—') : cleanPhone
        };
        if(editId) { await updateDoc(doc(db, "taksitulot", editId), data); editId = null; }
        else { await addDoc(collection(db, "taksitulot"), data); }
        document.getElementById('msgInput').value = '';
        document.querySelectorAll('.manual-fields input').forEach(i => i.value = '');
    };

    window.del = (id) => { if(confirm("Poista?")) deleteDoc(doc(db, "taksitulot", id)); };
</script>
</body>
</html>
