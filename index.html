<!DOCTYPE html>

<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuljetuskirja</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: sans-serif; text-align: center; padding-top: 20vh; margin: 0; }
        .btn-fix { 
            background: #fff; color: #000; padding: 20px 40px; 
            border-radius: 50px; font-weight: 900; font-size: 1.2rem; 
            border: 4px solid #c8f050; cursor: pointer; text-decoration: none;
            display: inline-block; box-shadow: 0 0 20px rgba(200, 240, 80, 0.4);
        }
        #status { margin-top: 30px; color: #888; font-family: monospace; }
        .loader { display: inline-block; width: 20px; height: 20px; border: 3px solid #c8f050; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

```
<h1 style="color: #c8f050; font-size: 2.5rem;">KULJETUSKIRJA</h1>
<p style="margin-bottom: 40px;">iPad-yhteys varmistettu</p>

<button id="startBtn" class="btn-fix">KIRJAUDU TÄSTÄ</button>

<div id="status">Tila: Odottaa klikkausta</div>
```

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithRedirect, onAuthStateChanged, getRedirectResult } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB7Dp5_5fN0Iko-4Jn1D2Dp6NNNih63U0O",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // KRIITTISET ASETUKSET:
    // 1. Pakotetaan Google kysymään tiliä
    provider.setCustomParameters({ 
        prompt: 'select_account',
        // Safari-yhteensopivuus: kerro Google että hyväksyt popup-redirect
        access_type: 'online'
    });

    // 2. Tarkistetaan heti onko tultu redirect-palautuksesta
    document.getElementById('status').innerText = "Tarkistetaan kirjautumista...";
    
    getRedirectResult(auth)
        .then((result) => {
            if (result && result.user) {
                // Onnistunut redirect-palautus
                console.log("Redirect-palautus onnistui:", result.user.email);
                handleUserLogin(result.user);
            } else {
                // Ei redirect-palautusta, ollaan normaalilla sivulla
                document.getElementById('status').innerText = "Tila: Odottaa klikkausta";
            }
        })
        .catch((error) => {
            console.error("Redirect-virhe:", error.code, error.message);
            
            if (error.code === 'auth/popup-closed-by-user') {
                document.getElementById('status').innerText = "Kirjautuminen peruutettiin.";
            } else if (error.code === 'auth/cross-origin-auth-not-integrated-client') {
                document.getElementById('status').innerText = "⚠️ Safari-ongelma. Kokeile Incognito-tilaa tai toista selainta.";
            } else {
                document.getElementById('status').innerText = `Virhe: ${error.message}`;
            }
        });

    // 3. Napin klikkaus - TÄYTYY OLLA SAMAN FUNCTION-KUTSUSSA KUIN signInWithRedirect
    document.getElementById('startBtn').onclick = async (e) => {
        e.preventDefault();
        document.getElementById('status').innerHTML = "Avataan varmistettua väylää<span class='loader'></span>";
        
        try {
            // signInWithRedirect TÄYTYY kutsua suoraan käyttäjän klikkauksesta
            // (Safari vaatii tämän)
            await signInWithRedirect(auth, provider);
        } catch (error) {
            console.error("Kirjautumisvirhe:", error.code);
            document.getElementById('status').innerText = `Virhe: ${error.message}`;
        }
    };

    // 4. Monitoroi kirjautumistilaa (redirect-palautuksen jälkeen)
    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "jacke.seilaa@gmail.com") {
            handleUserLogin(user);
        } else if (user) {
            // Väärä sähköpostiosoite
            document.body.innerHTML = `
                <div style="padding: 50px;">
                    <h1 style="color:#ff6b6b">PÄÄSY EVÄTTY</h1>
                    <p>Sähköposti: ${user.email}</p>
                    <p>Sinulla ei ole käyttöoikeutta tähän sovellukseen.</p>
                    <button onclick="location.reload()" style="padding:10px; margin-top:20px;">UUDELLEEN</button>
                </div>`;
        }
    });

    function handleUserLogin(user) {
        document.body.innerHTML = `
            <div style="padding: 50px;">
                <h1 style="color:#c8f050">PÄÄSY SALLITTU</h1>
                <p>Tervetuloa takaisin, Jacke.</p>
                <p style="font-size: 0.9rem; color: #888;">${user.email}</p>
                <button onclick="location.href='/tilaukset/'" style="padding:10px; margin-top:20px; background:#c8f050; color:#000; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">AVAA LISTA</button>
            </div>`;
    }
</script>

</body>
</html>
