<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuljetuskirja</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: -apple-system, sans-serif; text-align: center; padding-top: 15vh; margin: 0; }
        .container { padding: 20px; }
        .btn-fix { 
            background: #fff; color: #000; padding: 22px 45px; border-radius: 50px; 
            font-weight: 900; font-size: 1.3rem; border: 4px solid #c8f050; cursor: pointer;
            box-shadow: 0 0 25px rgba(200, 240, 80, 0.2); text-transform: uppercase;
        }
        #status { margin-top: 30px; color: #c8f050; font-weight: bold; }
        .error { color: #ff6b6b !important; background: rgba(255,107,107,0.1); padding: 10px; border-radius: 10px; margin-top: 10px; }
        #ui-authenticated { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #c8f050;">KULJETUSKIRJA</h1>
    
    <div id="ui-login">
        <button id="startBtn" class="btn-fix">KIRJAUDU TÄSTÄ</button>
        <div id="status">Odotetaan...</div>
    </div>

    <div id="ui-authenticated">
        <h2 style="color: #c8f050;">TERVETULOA JACKE</h2>
        <button id="finalLink" class="btn-fix" style="background: #c8f050;">AVAA TAKSITILAUKSET</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs", 
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "jacke.seilaa@gmail.com") {
            document.getElementById('ui-login').style.display = 'none';
            document.getElementById('ui-authenticated').style.display = 'block';
        }
    });

    document.getElementById('startBtn').onclick = async () => {
        const status = document.getElementById('status');
        status.innerHTML = "Avataan... Tarkista ettei selain estä ikkunaa.";
        
        try {
            // Pakotetaan popup
            await signInWithPopup(auth, provider);
        } catch (error) {
            console.error(error);
            status.innerHTML = `<div class="error">
                <b>KIRJAUTUMINEN ESTYI</b><br>
                1. Klikkaa osoitepalkin "AA" tai lukko-kuvaketta.<br>
                2. Salli ponnahdusikkunat (Pop-ups).<br>
                3. Jos käytät Yksityistä tilaa, ota se pois päältä.
            </div>`;
        }
    };

    document.getElementById('finalLink').onclick = () => {
        window.location.href = "https://jackeseilaa.github.io/taksitilaukset/";
    };
</script>
</body>
</html>
