<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuljetuskirja V24</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --border: #2e2e2e;
            --accent: #c8f050;
            --accent2: #50c8f0;
            --text: #f0f0f0;
            --muted: #444;
            --danger: #f05050;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .version-tag { color: var(--muted); font-size: 10px; text-align: center; margin-bottom: 10px; }
        h1 { font-family: 'Syne', sans-serif; font-size: 1.8rem; text-align: center; color: var(--accent); margin-bottom: 30px; }
        #auth-section { text-align: center; padding: 60px 20px; }
        .btn-login { background: white; color: black; padding: 20px 30px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; font-size: 1.1rem; }
        #app-content { display: none; }
        .user-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 0.8rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 15px; font-family: inherit; margin-bottom: 15px; min-height: 120px; outline: none; }
        .btn-add { background: var(--accent); color: black; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; border: none; margin-bottom: 10px; }
        .btn-excel { background: var(--surface); color: var(--accent2); width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; border: 1px solid var(--border); margin-bottom: 30px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { text-align: left; color: var(--accent2); padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div class="version-tag">VERSIO 24.0</div>

    <div id="auth-section">
        <h1>KULJETUSKIRJA</h1>
        <button class="btn-login" id="btnLogin">KIRJAUDU GOOGLE-TUNNUKSELLA</button>
    </div>

    <div id="app-content">
        <div class="user-header">
            <span id="userEmail"></span>
            <button onclick="auth.signOut()" style="background:none; color:var(--muted); border:none; text-decoration:underline;">Kirjaudu ulos</button>
        </div>
        
        <h1>KULJETUSKIRJA</h1>

        <textarea id="msgInput" placeholder="Liitä WhatsApp-viesti tähän..."></textarea>
        <button class="btn-add" id="btnAdd">LISÄÄ LISTAAN</button>
        <button class="btn-excel" id="btnExport">📥 LATAA EXCEL (CSV)</button>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>Pvm</th><th>Klo</th><th>Kohde</th><th>€</th><th></th></tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithRedirect, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    window.auth = auth;

    let currentLogs = [];

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "jacke.seilaa@gmail.com") {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('userEmail').innerText = user.email;
            startListening();
        } else {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('app-content').style.display = 'none';
            if(user) signOut(auth);
        }
    });

    document.getElementById('btnLogin').onclick = () => signInWithRedirect(auth, new GoogleAuthProvider());

    function startListening() {
        const q = query(collection(db, "taksitulot"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';
            currentLogs = [];
            snapshot.forEach(d => {
                const r = d.data();
                currentLogs.push(r);
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${r.date || ''}</td>
                    <td>${r.time || ''}</td>
                    <td>${r.to || '?'}</td>
                    <td style="color:#c8f050">${r.price}€</td>
                    <td><button onclick="delItem('${d.id}')" style="background:none; border:none; color:#f05050;">✕</button></td>
                `;
                tbody.appendChild(tr);
            });
        });
    }

    window.delItem = (id) => confirm("Poistetaanko?") && deleteDoc(doc(db, "taksitulot", id));

    // EXCEL-VIENTI
    document.getElementById('btnExport').onclick = () => {
        if(currentLogs.length === 0) return alert("Ei tietoja vietäväksi.");
        let csv = "Pvm;Klo;Kohde;Hinta\n";
        currentLogs.forEach(r => {
            csv += `${r.date};${r.time};${r.to};${r.price}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", "kuljetuskirja.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };

    document.getElementById('btnAdd').onclick = async () => {
        const text = document.getElementById('msgInput').value;
        if(!text) return;
        const lines = text.split('\n').map(l => l.trim());
        const data = {
            date: text.match(/(\d{1,2})\.(\d{1,2})/)?.[0] || '',
            time: text.match(/(\d{1,2})[.:](\d{2})/)?.[0] || '',
            from: lines.find(l => l.toLowerCase().includes('lähtö')) || '?',
            to: lines.find(l => l.toLowerCase().includes('meno') || l.toLowerCase().includes('kohde')) || '?',
            price: text.match(/(\d+)\s*[€eE]/)?.[1] || '0',
            createdAt: new Date()
        };
        await addDoc(collection(db, "taksitulot"), data);
        document.getElementById('msgInput').value = '';
    };
</script>
</body>
</html>
