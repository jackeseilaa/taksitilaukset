<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuljetuskirja</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: -apple-system, sans-serif; text-align: center; padding-top: 10vh; margin: 0; }
        .container { padding: 20px; max-width: 400px; margin: auto; }
        .btn-fix { 
            background: #fff; color: #000; padding: 25px; border-radius: 50px; width: 100%;
            font-weight: 900; font-size: 1.4rem; border: 4px solid #c8f050; cursor: pointer;
            box-shadow: 0 0 30px rgba(200, 240, 80, 0.3); text-transform: uppercase; margin-bottom: 20px;
        }
        #status { margin-top: 20px; color: #c8f050; font-size: 1.1rem; min-height: 2em; }
        #debug { font-family: monospace; font-size: 10px; color: #444; margin-top: 40px; text-align: left; overflow-wrap: break-word; }
        .error { color: #ff6b6b !important; font-weight: bold; }
        #ui-authenticated { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #c8f050; font-size: 2.5rem;">KULJETUSKIRJA</h1>
    
    <div id="ui-login">
        <button id="startBtn" class="btn-fix">KIRJAUDU SISÄÄN</button>
        <div id="status">Alustetaan...</div>
    </div>

    <div id="ui-authenticated">
        <h2 style="color: #c8f050;">TERVETULOA JACKE</h2>
        <button id="finalLink" class="btn-fix" style="background: #c8f050;">AVAA TAKSITILAUKSET</button>
        <p id="userEmail" style="color: #888;"></p>
    </div>

    <div id="debug">DEBUG LOG:</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const log = (msg) => { document.getElementById('debug').innerHTML += "<br>> " + msg; };

    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs", 
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    log("Käynnistetään Firebase...");
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // 1. TARKISTA REDIRECT-TULOS (Kun palataan Googlesta)
    getRedirectResult(auth).then((result) => {
        if (result?.user) {
            log("Redirect onnistui: " + result.user.email);
        }
    }).catch((error) => {
        log("Redirect virhe: " + error.code);
        document.getElementById('status').innerHTML = `<span class="error">VIRHE: ${error.code}</span>`;
    });

    // 2. KUUNTELE KIRJAUTUMISTA
    onAuthStateChanged(auth, (user) => {
        if (user) {
            log("Kirjautunut sisään: " + user.email);
            if (user.email === "jacke.seilaa@gmail.com") {
                document.getElementById('ui-login').style.display = 'none';
                document.getElementById('ui-authenticated').style.display = 'block';
                document.getElementById('userEmail').innerText = user.email;
            } else {
                document.getElementById('status').innerHTML = `<span class="error">PÄÄSY EVÄTTY: ${user.email}</span>`;
            }
        } else {
            log("Ei käyttäjää.");
            document.getElementById('status').innerText = "Valmiina.";
        }
    });

    // 3. NAPPI: ALOITA KIRJAUTUMINEN
    document.getElementById('startBtn').onclick = async () => {
        log("Klikattu nappia.");
        document.getElementById('status').innerText = "Ohjataan Googleen...";
        try {
            // Käytetään Redirectia, joka on iPadilla varmempi jos popupit on blokattu
            await signInWithRedirect(auth, provider);
        } catch (error) {
            log("Klikkausvirhe: " + error.message);
            document.getElementById('status').innerHTML = `<span class="error">${error.code}</span>`;
        }
    };

    document.getElementById('finalLink').onclick = () => {
        window.location.href = "https://jackeseilaa.github.io/taksitilaukset/";
    };
</script>
</body>
</html>
