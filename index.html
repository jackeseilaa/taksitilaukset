<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuljetuskirja V32.4</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f0f0f; --surface: #1a1a1a; --border: #2e2e2e; 
            --accent: #c8f050; --accent2: #50c8f0; --text: #f0f0f0; --muted: #666; 
            --edit: #f0a050; --future-bg: #d4f8a0; --future-text: #000000;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); padding: 15px; }
        .v-tag { color: var(--muted); font-size: 10px; text-align: center; margin-bottom: 10px; }
        h1 { font-family: 'Syne', sans-serif; font-size: 1.1rem; text-align: center; color: var(--accent); margin-bottom: 20px; text-transform: uppercase; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.7rem; color: var(--muted); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px; font-family: inherit; margin-bottom: 10px; min-height: 160px; outline: none; font-size: 0.9rem; border-left: 4px solid var(--accent); }
        .btn-add { background: var(--accent); color: black; width: 100%; padding: 18px; border-radius: 8px; font-weight: bold; border: none; margin-bottom: 15px; cursor: pointer; font-size: 1.1rem; text-transform: uppercase; }
        .btn-update { background: var(--edit) !important; color: white !important; }
        .table-wrapper { overflow-x: auto; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; min-width: 900px; }
        th { text-align: left; color: var(--accent2); padding: 12px; border-bottom: 1px solid var(--border); background: #222; }
        td { padding: 12px; border-bottom: 1px solid #222; vertical-align: top; line-height: 1.4; }
        .day-separator { border-top: 4px solid var(--accent2) !important; }
        .row-future { background-color: var(--future-bg) !important; color: var(--future-text) !important; }
        .row-future b, .row-future small, .row-future .price-text { color: #000 !important; }
        .row-past { opacity: 0.7; }
        .price-text { font-weight: bold; color: var(--accent); border: 1px solid rgba(200,240,80,0.3); padding: 1px 4px; border-radius: 3px; }
        .action-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; padding: 5px; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="v-tag">VERSIO 32.4</div>
    <div id="app-content">
        <h1 id="form-header">KULJETUSKIRJA 2026</h1>
        <textarea id="msgInput" placeholder="Liitä viesti tähän..."></textarea>
        <button class="btn-add" id="btnAdd">TALLENNA TILAUS</button>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>Pvm/Klo</th><th>Nouto/Kohde</th><th>Asiakas/Puh</th><th>Hinta</th><th>Lasku/Tilaaja</th><th>Huomio</th><th></th></tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentLogs = [];
    let editId = null;

    function startListening() {
        onSnapshot(query(collection(db, "taksitulot")), (snapshot) => {
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';
            currentLogs = [];
            snapshot.forEach(d => currentLogs.push({id: d.id, ...d.data()}));

            // Lajittelu: Uusin driveTimestamp ensin
            currentLogs.sort((a, b) => (b.driveTimestamp || 0) - (a.driveTimestamp || 0));

            let lastDate = "";
            const now = Date.now();

            currentLogs.forEach(r => {
                const isFuture = (r.driveTimestamp || 0) > (now - 3600000 * 3); // 3h puskuri
                const rowClass = isFuture ? 'row-future' : 'row-past';
                let separator = (lastDate !== "" && r.date !== lastDate) ? "day-separator" : "";
                lastDate = r.date;

                const tr = document.createElement('tr');
                tr.className = `${rowClass} ${separator}`;
                tr.innerHTML = `
                    <td><b>${r.date}</b><br>${r.time}</td>
                    <td><small>N:</small> ${r.from}<br><small>K:</small> ${r.to}</td>
                    <td>${r.customer}<br><small>${r.phone}</small></td>
                    <td><span class="price-text">${r.price}€</span><br><small>${r.type}</small></td>
                    <td>${r.billing}<br><small>${r.booker}</small></td>
                    <td><small>${r.notes}</small></td>
                    <td>
                        <button class="action-btn" onclick="window.prepareEdit('${r.id}')">✎</button>
                        <button class="action-btn" onclick="window.deleteItem('${r.id}')">✕</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        });
    }

    window.prepareEdit = (id) => {
        const item = currentLogs.find(l => l.id === id);
        if(!item) return;
        editId = id;
        document.getElementById('msgInput').value = `Pvm: ${item.date}\nKlo: ${item.time}\nNouto: ${item.from}\nKohde: ${item.to}\nAsiakas: ${item.customer}\nPuh: ${item.phone}\nHinta: ${item.price}\nTyyppi: ${item.type}\nLaskulle: ${item.billing}\nTilaaja: ${item.booker}\nHuomio: ${item.notes}`;
        document.getElementById('btnAdd').innerText = "PÄIVITÄ TILAUS";
        document.getElementById('btnAdd').classList.add('btn-update');
        window.scrollTo(0,0);
    };

    window.deleteItem = (id) => {
        if(confirm("Poistetaanko?")) deleteDoc(doc(db, "taksitulot", id));
    };

    document.getElementById('btnAdd').onclick = async () => {
        const text = document.getElementById('msgInput').value;
        if(!text) return;
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        
        const findByKeys = (keys) => {
            const line = lines.find(l => keys.some(k => l.toLowerCase().includes(k.toLowerCase())));
            if (!line) return null;
            return line.includes(':') ? line.split(':').slice(1).join(':').trim() : line;
        };

        const dateM = text.match(/(\d{1,2})\.(\d{1,2})/);
        const timeM = text.match(/(\d{1,2})[.:](\d{2})/);
        const phoneM = text.match(/(\+?\d[\d\s-]{7,15})/);
        const priceM = text.match(/(?<!\d)(\d{1,3})\s*[e€]/i);

        // HAKULOGIIKKA: Jos ei löydy avainsanalla, otetaan oletusriveiltä
        let from = findByKeys(['Nouto', 'Lähtö']) || lines[2] || '—';
        let to = findByKeys(['Kohde', 'Määränpää', 'Meno']) || lines[3] || '—';
        let customer = findByKeys(['Nimi', 'Asiakas', 'Kyytiin', 'Matkustaja']) || lines[4] || '—';

        // Siivotaan puhelinnumero pois nimestä jos se tarttui mukaan
        if (phoneM) customer = customer.replace(phoneM[0], '').trim();

        let dDate = new Date(2026, dateM ? parseInt(dateM[2])-1 : 3, dateM ? parseInt(dateM[1]) : 23);
        if (timeM) dDate.setHours(parseInt(timeM[1]), parseInt(timeM[2]), 0, 0);

        const data = {
            date: dateM ? dateM[0] : "—",
            time: timeM ? timeM[0] : "—",
            from: from,
            to: to,
            customer: customer,
            phone: phoneM ? phoneM[0] : '—',
            price: priceM ? priceM[1] : '0',
            type: text.toLowerCase().includes('vip') ? 'VIP' : 'Normaali',
            notes: lines.find(l => l.toLowerCase().includes('huomio') || l.toLowerCase().includes('odotus')) || '—',
            billing: findByKeys(['Laskulle', 'Maksutapa']) || '—',
            booker: findByKeys(['Tilaaja']) || '—',
            driveTimestamp: dDate.getTime()
        };

        if(editId) {
            await updateDoc(doc(db, "taksitulot", editId), data);
            editId = null;
            document.getElementById('btnAdd').innerText = "TALLENNA TILAUS";
            document.getElementById('btnAdd').classList.remove('btn-update');
        } else {
            await addDoc(collection(db, "taksitulot"), data);
        }
        document.getElementById('msgInput').value = '';
    };

    startListening();
</script>
</body>
</html>
