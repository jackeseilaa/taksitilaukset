<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuljetuskirja V32.6</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f0f0f; --surface: #1a1a1a; --border: #2e2e2e; 
            --accent: #c8f050; --accent2: #50c8f0; --text: #f0f0f0; --muted: #666; 
            --edit: #f0a050; --future-bg: #d4f8a0; --future-text: #000000;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); padding: 15px; }
        .v-tag { color: var(--muted); font-size: 10px; text-align: center; margin-bottom: 10px; }
        h1 { font-family: 'Syne', sans-serif; font-size: 1.2rem; text-align: center; color: var(--accent); margin-bottom: 20px; text-transform: uppercase; }
        #auth-section { text-align: center; padding: 100px 20px; }
        .btn-login { background: white; color: black; padding: 18px 30px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; }
        #app-content { display: none; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.7rem; color: var(--muted); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 15px; font-family: inherit; margin-bottom: 10px; min-height: 160px; outline: none; font-size: 0.95rem; border-left: 4px solid var(--accent); }
        .btn-add { background: var(--accent); color: black; width: 100%; padding: 20px; border-radius: 8px; font-weight: 800; border: none; margin-bottom: 20px; cursor: pointer; font-size: 1.1rem; }
        .btn-update { background: var(--edit) !important; color: white !important; }
        .table-wrapper { overflow-x: auto; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 900px; }
        th { text-align: left; color: var(--accent2); padding: 15px; border-bottom: 1px solid var(--border); background: #222; }
        td { padding: 15px; border-bottom: 1px solid #222; vertical-align: top; line-height: 1.5; }
        .day-separator { border-top: 5px solid var(--accent2) !important; }
        .row-future { background-color: var(--future-bg) !important; color: var(--future-text) !important; }
        .row-future b, .row-future small { color: #000 !important; }
        .row-past { opacity: 0.6; }
        .price-tag { font-weight: bold; color: var(--accent); border: 1px solid rgba(200,240,80,0.3); padding: 2px 5px; border-radius: 4px; }
        .row-future .price-tag { color: #000; border-color: #000; }
        .action-btn { background: none; border: none; font-size: 1.4rem; cursor: pointer; padding: 5px; }
    </style>
</head>
<body>
    <div class="v-tag">VERSIO 32.6</div>
    <div id="auth-section">
        <h1>KULJETUSKIRJA</h1>
        <button class="btn-login" id="btnLogin">KIRJAUDU SISÄÄN</button>
    </div>
    <div id="app-content">
        <div class="top-bar"><span id="userEmail"></span><button id="btnLogout" style="background:none; color:inherit; border:none; text-decoration:underline;">Ulos</button></div>
        <h1 id="form-header">UUSI TILAUS</h1>
        <textarea id="msgInput" placeholder="Liitä WhatsApp-viesti..."></textarea>
        <button class="btn-add" id="btnAdd">TALLENNA TILAUS</button>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Pvm/Klo</th><th>Nouto / Kohde</th><th>Asiakas / Puh</th><th>Hinta</th><th>Lasku / Tilaaja</th><th>Huomio</th><th></th></tr></thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentLogs = [];
    let editId = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('userEmail').innerText = user.email;
            startListening();
        } else {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('app-content').style.display = 'none';
        }
    });

    document.getElementById('btnLogin').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btnLogout').onclick = () => signOut(auth);

    function startListening() {
        onSnapshot(query(collection(db, "taksitulot")), (snapshot) => {
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';
            currentLogs = [];
            snapshot.forEach(d => currentLogs.push({id: d.id, ...d.data()}));

            currentLogs.sort((a, b) => (b.driveTimestamp || 0) - (a.driveTimestamp || 0));

            let lastDateStr = "";
            const now = Date.now();

            currentLogs.forEach(r => {
                const isFuture = (r.driveTimestamp || 0) > (now - 10800000);
                const rowClass = isFuture ? 'row-future' : 'row-past';
                let separator = (lastDateStr !== "" && r.date !== lastDateStr) ? "day-separator" : "";
                lastDateStr = r.date;

                const tr = document.createElement('tr');
                tr.className = `${rowClass} ${separator}`;
                tr.innerHTML = `
                    <td><b>${r.date}</b><br>${r.time}</td>
                    <td><small>N:</small> ${r.from}<br><small>K:</small> ${r.to}</td>
                    <td>${r.customer}<br><small>${r.phone}</small></td>
                    <td><span class="price-tag">${r.price}€</span><br><small>${r.type}</small></td>
                    <td>${r.billing}<br><small>${r.booker}</small></td>
                    <td><small>${r.notes}</small></td>
                    <td><button class="action-btn" onclick="window.prepareEdit('${r.id}')">✎</button><button class="action-btn" onclick="window.deleteItem('${r.id}')">✕</button></td>
                `;
                tbody.appendChild(tr);
            });
        });
    }

    window.prepareEdit = (id) => {
        const item = currentLogs.find(l => l.id === id);
        if(!item) return;
        editId = id;
        document.getElementById('msgInput').value = `Pvm: ${item.date}\nKlo: ${item.time}\nNouto: ${item.from}\nKohde: ${item.to}\nAsiakas: ${item.customer}\nPuh: ${item.phone}\nHinta: ${item.price}\nTyyppi: ${item.type}\nLaskulle: ${item.billing}\nTilaaja: ${item.booker}\nHuomio: ${item.notes}`;
        document.getElementById('btnAdd').innerText = "PÄIVITÄ TILAUS";
        document.getElementById('btnAdd').classList.add('btn-update');
        window.scrollTo(0,0);
    };

    window.deleteItem = (id) => { if(confirm("Poistetaanko?")) deleteDoc(doc(db, "taksitulot", id)); };

    document.getElementById('btnAdd').onclick = async () => {
        const text = document.getElementById('msgInput').value;
        if(!text) return;
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        
        const getCleanVal = (keys) => {
            const idx = lines.findIndex(l => keys.some(k => l.toLowerCase().includes(k.toLowerCase())));
            if (idx === -1) return '—';
            let val = lines[idx].includes(':') ? lines[idx].split(':').slice(1).join(':') : (lines[idx+1] || '—');
            // Siivotaan pilkut, viivat ja kauttaviivat alusta/lopusta
            return val.replace(/^[\s\s\/\,\-]+/, '').replace(/[\s\s\/\,\-]+$/, '').trim();
        };

        const dateM = text.match(/(\d{1,2})\.(\d{1,2})/);
        const timeM = text.match(/(\d{1,2})[.:](\d{2})/);
        const phoneM = text.match(/(\+?\d[\d\s-]{8,15})/);
        const priceM = text.match(/(?<!\d)(\d{1,3})\s*[e€]/i);

        let customer = getCleanVal(['Kyytiin', 'Asiakas', 'Nimi']);
        if (phoneM) customer = customer.replace(phoneM[0], '').replace(/\//g, '').trim();

        let dDate = new Date(2026, dateM ? parseInt(dateM[2])-1 : 3, dateM ? parseInt(dateM[1]) : 23);
        if (timeM) dDate.setHours(parseInt(timeM[1]), parseInt(timeM[2]), 0, 0);

        const data = {
            date: dateM ? dateM[0] : "23.4.",
            time: timeM ? timeM[0] : "—",
            from: getCleanVal(['Lähtö', 'Nouto']),
            to: getCleanVal(['Meno', 'Kohde']),
            customer: customer,
            phone: phoneM ? phoneM[0] : '—',
            price: priceM ? priceM[1] : '0',
            type: text.toLowerCase().includes('vip') ? 'VIP' : 'Normaali',
            notes: lines.find(l => l.toLowerCase().includes('odotus') || l.toLowerCase().includes('huomio')) || '—',
            billing: text.toLowerCase().includes('lasku') ? 'Lasku' : '—',
            booker: '—',
            driveTimestamp: dDate.getTime()
        };

        if(editId) {
            await updateDoc(doc(db, "taksitulot", editId), data);
            editId = null;
            document.getElementById('btnAdd').innerText = "TALLENNA TILAUS";
            document.getElementById('btnAdd').classList.remove('btn-update');
        } else {
            await addDoc(collection(db, "taksitulot"), data);
        }
        document.getElementById('msgInput').value = '';
    };
</script>
</body>
</html>
