<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuljetuskirja V20</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 20vh; }
        .nappi { 
            display: inline-block; padding: 20px 40px; background: #c8f050; color: #000; 
            text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 1.2rem;
        }
        #tila { margin-bottom: 20px; color: #c8f050; }
    </style>
</head>
<body>

    <div style="color: #222; font-size: 10px;">VERSIO 20.0</div>
    <h1>KULJETUSKIRJA</h1>
    <div id="tila">Odotetaan...</div>

    <div id="sisalto">
        </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithRedirect, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Käytetään varmistettua API-avainta
    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const container = document.getElementById('sisalto');
    const tila = document.getElementById('tila');

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "jacke.seilaa@gmail.com") {
            tila.innerText = "Tervetuloa " + user.email;
            container.innerHTML = '<a href="https://jackeseilaa.github.io/taksitilaukset/" class="nappi">AVAA TAKSITILAUKSET</a>';
        } else {
            tila.innerText = "Kirjaudu sisään jatkaaksesi";
            container.innerHTML = '<button id="login" class="nappi" style="background:#fff;">KIRJAUDU TÄSTÄ</button>';
            
            document.getElementById('login').onclick = () => {
                signInWithRedirect(auth, new GoogleAuthProvider());
            };
        }
    });
</script>
</body>
</html>
