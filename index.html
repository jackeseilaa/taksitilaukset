<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuljetuskirja</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: -apple-system, sans-serif; text-align: center; padding-top: 20vh; margin: 0; }
        .container { padding: 20px; }
        .btn { 
            display: none; padding: 25px; border-radius: 50px; width: 100%; max-width: 350px;
            font-weight: 900; font-size: 1.4rem; border: 4px solid #c8f050; cursor: pointer;
            text-transform: uppercase; margin: 20px auto;
        }
        #startBtn { background: #fff; color: #000; }
        #finalLink { background: #c8f050; color: #000; border-color: #fff; }
        #status { color: #c8f050; margin-top: 20px; font-weight: bold; }
        .v { color: #222; font-size: 10px; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #c8f050; font-size: 2.5rem;">KULJETUSKIRJA</h1>
    
    <div id="status">Tarkistetaan istuntoa...</div>

    <button id="startBtn" class="btn">KIRJAUDU SISÄÄN</button>
    <button id="finalLink" class="btn">AVAA TAKSITILAUKSET</button>

    <div id="userEmail" style="color:#666; margin-top:10px;"></div>
    <div class="v">Versio 8.0 - Force Load</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithRedirect, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const sBtn = document.getElementById('startBtn');
    const fBtn = document.getElementById('finalLink');
    const stat = document.getElementById('status');

    // TÄRKEÄIN FUNKTIO: Ohjaa näkymää
    onAuthStateChanged(auth, (user) => {
        if (user) {
            if (user.email === "jacke.seilaa@gmail.com") {
                stat.innerText = "TERVETULOA JACKE";
                sBtn.style.display = "none";
                fBtn.style.display = "block"; // Näytä vihreä nappi
                document.getElementById('userEmail').innerText = user.email;
            } else {
                stat.innerText = "PÄÄSY EVÄTTY: " + user.email;
                sBtn.style.display = "block";
                fBtn.style.display = "none";
            }
        } else {
            stat.innerText = "Vaatii kirjautumisen";
            sBtn.style.display = "block"; // Näytä valkoinen nappi
            fBtn.style.display = "none";
        }
    });

    // Kirjautumisen aloitus
    sBtn.onclick = () => {
        stat.innerText = "Ohjataan Googleen...";
        signInWithRedirect(auth, provider);
    };

    // Siirtyminen perille
    fBtn.onclick = () => {
        window.location.replace("https://jackeseilaa.github.io/taksitilaukset/");
    };
</script>
</body>
</html>
