<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs", authDomain: "jsailing-f716c.firebaseapp.com", projectId: "jsailing-f716c", storageBucket: "jsailing-f716c.firebasestorage.app", appId: "1:543523103696:web:439a312efa6aec398a8fd5" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentLogs = [];
    let editId = null;

    onAuthStateChanged(auth, (u) => { if(u) startListening(); else signInWithPopup(auth, provider); });

    // Kellonajan puhdistus ja validaatio HH:mm muotoon
    const formatTime = (t) => {
        if (!t) return "00:00";
        let clean = t.replace(/[^\d]/g, '');
        
        if (clean.length >= 3) {
            if (clean.length === 3) clean = '0' + clean;
            if (clean.length >= 4) {
                let hours = parseInt(clean.substring(0, 2));
                let minutes = parseInt(clean.substring(2, 4));
                
                if (isNaN(hours) || isNaN(minutes)) return "00:00";
                hours = Math.max(0, Math.min(23, hours));
                minutes = Math.max(0, Math.min(59, minutes));
                
                return String(hours).padStart(2, '0') + ':' + String(minutes).padStart(2, '0');
            }
        }
        return t.replace('.', ':');
    };

    // Päivämäärän automaattinen täydennys nykyisellä vuodella
    const formatDate = (dateStr) => {
        if (!dateStr) return "";
        const parts = dateStr.split('.');
        if (parts.length === 2) {
            return `${parts[0]}.${parts[1]}.${new Date().getFullYear()}`;
        }
        return dateStr;
    };

    // Huomisen päivämäärän laskenta
    const getTomorrowDate = () => {
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        const day = String(tomorrow.getDate()).padStart(2, '0');
        const month = String(tomorrow.getMonth() + 1).padStart(2, '0');
        const year = tomorrow.getFullYear();
        return `${day}.${month}.${year}`;
    };

    window.parseMessage = () => {
        if (editId) return;
        const txt = document.getElementById('msgInput').value;
        const lines = txt.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        
        // Parannettu päivämäärä-parsinta: "Huomenna" + päivä/kk
        let pvmValue = "";
        if (txt.toLowerCase().includes('huomenna')) {
            pvmValue = getTomorrowDate();
        } else {
            let pvmM = txt.match(/(\d{1,2})\.(\d{1,2})/);
            if (pvmM) pvmValue = formatDate(pvmM[0]);
        }
        document.getElementById('inPvm').value = pvmValue;
        
        // Parempi kellonajan etsintä ja validaatio
        let kloMatch = txt.match(/(\d{1,2})[.:](\d{2})/) || txt.match(/klo\s*(\d{4})/i) || txt.match(/klo\s*(\d{1,2})/i);
        document.getElementById('inKlo').value = kloMatch ? formatTime(kloMatch[0].replace(/klo/i, '').trim()) : "";
        
        // AUTO-PARSINTA: Etsi "Auto:", "/", tai numero 1-3 merkkiä (esim 154, SB, 89)
        let autoVal = "";
        const autoIdx = lines.findIndex(l => l.toLowerCase().match(/^auto:/));
        if (autoIdx !== -1 && lines[autoIdx+1]) {
            autoVal = lines[autoIdx+1].trim();
        } else {
            // Etsi myös muodosta "/154" tai varsinaisesti ilmaistua autoa
            let autoMatch = txt.match(/^\/\s*(\w{1,3})\s*$/m) || txt.match(/\bauto[:\s]+(\w{1,3})\b/i);
            if (autoMatch) {
                autoVal = autoMatch[1].toUpperCase();
            }
        }
        document.getElementById('inAuto').value = autoVal;
        
        // PARANNETTU HINTA-PARSINTA: etsi numero joka on VÄLITTÖMÄSTI € tai e merkinnän edellä
        // Jätä välistä "1min", "5min" jne. — ota vain oikea hinta
        let hintaMatch = txt.match(/\b(\d+)\s*[e€]\b/i);
        document.getElementById('inHinta').value = hintaMatch ? hintaMatch[1] : "";
        
        let typeVal = "Normaali";
        if (txt.toLowerCase().includes('vip')) {
            typeVal = 'VIP';
        }
        document.getElementById('inTyyppi').value = typeVal;
        
        const fIdx = lines.findIndex(l => l.toLowerCase().match(/^lähtö|^nouto/));
        document.getElementById('inFrom').value = (fIdx !== -1 && lines[fIdx+1]) ? lines[fIdx+1] : "";

        const tIdx = lines.findIndex(l => l.toLowerCase().match(/^meno|^kohde/));
        document.getElementById('inTo').value = (tIdx !== -1 && lines[tIdx+1]) ? lines[tIdx+1] : "";
        
        // PARANNETTU: Tunnista "Kyytiin", "Nimi:", "Nimet:"
        const nIdx = lines.findIndex(l => l.toLowerCase().match(/^kyytiin|^nimi:|^nimet:/));
        let passenger = "";
        if (nIdx !== -1 && lines[nIdx+1]) {
            passenger = lines[nIdx+1]
                .replace(/[\/]/g, '')
                .replace(/\+?\d[\d\s-]{7,}/, '')
                .trim();
        }
        document.getElementById('inNimi').value = passenger;

        // PARANNETTU TILAAJA: "tilaaja:", "Tilaaja:", "/ tilaaja:" — kaikki muodot
        let ordererVal = "";
        const orderIdx = lines.findIndex(l => l.toLowerCase().match(/tilaaja|\/\s*tilaaja/i));
        if (orderIdx !== -1) {
            let line = lines[orderIdx];
            // Jos rivillä on ":", ota : jälkeinen osa
            if (line.includes(':')) {
                let afterColon = line.split(':')[1].trim();
                // Jos : jälkeen on vielä tekstiä, käytä sitä
                if (afterColon && afterColon.length > 0) {
                    ordererVal = afterColon.replace(/[\/]/g, '').trim();
                } else if (lines[orderIdx+1]) {
                    // Muuten ota seuraava rivi
                    ordererVal = lines[orderIdx+1].replace(/[\/]/g, '').trim();
                }
            } else if (lines[orderIdx+1]) {
                ordererVal = lines[orderIdx+1].replace(/[\/]/g, '').trim();
            }
        }
        document.getElementById('inTilaaja').value = ordererVal;

        // PARANNETTU LASKU: "Lasku", "/ laskulle", "laskulle" — kaikki muodot, ignoroi "Ok?"
        let billVal = "Asiakas maksaa";
        if (txt.toLowerCase().includes("maksu autoon")) {
            billVal = "Maksu autoon";
        } else if (txt.toLowerCase().includes("fortum")) {
            billVal = "FORTUM";
        } else if (txt.toLowerCase().includes("kone")) {
            billVal = "KONE";
        } else {
            // Etsi rivi joka sisältää "lasku" tai "/ lasku"
            const bIdx = lines.findIndex(l => l.toLowerCase().match(/lasku|\/\s*lasku/i));
            if (bIdx !== -1) {
                let line = lines[bIdx];
                if (line.includes(':')) {
                    let afterColon = line.split(':')[1].trim();
                    if (afterColon && !afterColon.toLowerCase().match(/^ok\?/)) {
                        billVal = afterColon;
                    }
                } else {
                    for (let i = bIdx + 1; i < lines.length; i++) {
                        if (lines[i] && !lines[i].toLowerCase().match(/^ok\?|^ok/)) {
                            billVal = lines[i];
                            break;
                        }
                    }
                }
            }
        }
        document.getElementById('inLasku').value = billVal;

        let phoneMatch = txt.match(/(\+?\d[\d\s-]{8,15})/)?.[0] || '';
        document.getElementById('inPuhelin').value = phoneMatch;

        // Parannettu poikkeama-tunnistus
        let deviationVal = "";
        if (txt.toLowerCase().match(/odotus|extra|lisä|ylimenev|kulutus/)) {
            let devMatch = txt.match(/(odotus|extra|lisä|ylimenev|kulutus)[^.\n]*/gi);
            if (devMatch) {
                deviationVal = devMatch.join('; ').substring(0, 100);
            } else {
                deviationVal = "Odotus/lisäaika";
            }
        }
        document.getElementById('inPoikkeama').value = deviationVal;

        // Huomiot: suodata pois komennot, pvm, puhelinumerot, poikkeamat, maksutiedot JA lähtö/meno osoitteet
        let fromVal = document.getElementById('inFrom').value;
        let toVal = document.getElementById('inTo').value;
        
        let notes = lines.filter(l => 
            !l.toLowerCase().match(/^lähtö|^meno|^kyytiin|^nimi:|^nimet:|tilaaja|til:|lasku|^klo|^nouto|^kohde|^huomenna/) &&
            !l.match(/^(\d{1,2})\.(\d{1,2})/) &&
            !l.toLowerCase().match(/^ok\?|^ok/) &&
            !l.match(/^\+?\d[\d\s-]{8,}/) &&
            !l.toLowerCase().match(/maksu\s*autoon|maksu/) &&
            l !== passenger && l !== ordererVal &&
            l !== fromVal && l !== toVal &&  // UUSI: poistetaan lähtö ja meno rivit
            !l.toLowerCase().match(/odotus|extra|lisä|ylimenev|kulutus/) &&
            !l.match(/^\d+\s*[e€]/)
        ).join(' ').replace(/[\/]/g, '').replace(/\s\s+/g, ' ').trim();
        
        document.getElementById('inHuomio').value = notes;
    };

    function startListening() {
        onSnapshot(query(collection(db, "taksitulot")), (snap) => {
            const tbody = document.getElementById('logs');
            tbody.innerHTML = '';
            currentLogs = snap.docs.map(d => ({id: d.id, ...d.data()}));
            
            currentLogs.sort((a,b) => {
                const k = (i) => {
                    let p = (i.date || '01.01.' + new Date().getFullYear()).split('.');
                    return `${p[2]||new Date().getFullYear()}-${(p[1]||'01').padStart(2,'0')}-${(p[0]||'01').padStart(2,'0')}-${(i.time||'00:00').replace('.',':')}`;
                };
                return k(b).localeCompare(k(a));
            });

            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);

            const fragment = document.createDocumentFragment();
            currentLogs.forEach(r => {
                const tr = document.createElement('tr');
                const p = (r.date || '').split('.');
                const rD = new Date(parseInt(p[2]||2026), parseInt(p[1]||1)-1, parseInt(p[0]||1));
                
                // Erottele: tänään (row-today), huomenna+ (row-future), menneisyys (row-past)
                if (rD < today) {
                    tr.className = 'row-past';
                } else if (rD >= today && rD < tomorrow) {
                    tr.className = 'row-today';
                } else {
                    tr.className = 'row-future';
                }
                
                // Google Maps -linkit osoitteille
                const mapsUrl = (address) => {
                    if (!address) return '#';
                    return `https://www.google.com/maps/search/${encodeURIComponent(address)}`;
                };
                
                tr.innerHTML = `
                    <td><b style="font-size:1rem">${r.date}</b><br><span class="time-tag">${r.time || '00:00'}</span><br><small style="color: var(--accent); font-weight: bold;">${r.car || '-'}</small></td>
                    <td>
                        <a href="${mapsUrl(r.from)}" target="_blank" style="text-decoration: none; color: inherit;">
                            <b>${r.from}</b>
                        </a>
                        <br>⬇<br>
                        <a href="${mapsUrl(r.to)}" target="_blank" style="text-decoration: none; color: inherit;">
                            <b>${r.to}</b>
                        </a>
                    </td>
                    <td><b>${r.customer}</b></td>
                    <td><small>${r.phone || '-'}</small></td>
                    <td>${r.orderer || '-'}</td>
                    <td><span class="price-tag">${r.price}€</span><br><b>${r.type}</b></td>
                    <td><b>${r.billing || 'Asiakas maksaa'}</b></td>
                    <td><small><span class="note-tag"><b>HUO:</b> ${r.notes || '-'}</span><br><span class="deviation-tag"><b>POIK:</b> ${r.deviation || '-'}</span></small></td>
                    <td>
                        <button class="action-btn" onclick="window.prepareEdit('${r.id}')">✎</button>
                        <button class="action-btn" onclick="window.del('${r.id}')">✕</button>
                    </td>
                `;
                fragment.appendChild(tr);
            });
            tbody.appendChild(fragment);
        });
    }

    const cleanCSV = (str) => {
        if (!str) return "";
        return str.toString().replace(/;/g, ',').replace(/(\r\n|\n|\r)/gm, " ").trim();
    };

    window.exportToCSV = (filter = 'all') => {
        const today = new Date();
        const todayStr = `${String(today.getDate()).padStart(2, '0')}.${String(today.getMonth() + 1).padStart(2, '0')}.${today.getFullYear()}`;
        const currentMonth = `${String(today.getMonth() + 1).padStart(2, '0')}.${today.getFullYear()}`;
        
        let logsToExport = currentLogs;
        let filename = 'ajot';
        
        if (filter === 'today') {
            logsToExport = currentLogs.filter(r => r.date === todayStr);
            filename = `ajot_tänään_${todayStr}`;
        } else if (filter === 'month') {
            logsToExport = currentLogs.filter(r => {
                const logMonth = r.date.substring(3); // Otetaan kk.yyyy osasta
                return logMonth === currentMonth;
            });
            filename = `ajot_kuukausi_${currentMonth}`;
        } else {
            filename = `ajot_kaikki_${new Date().toLocaleDateString('fi-FI')}`;
        }
        
        if (logsToExport.length === 0) {
            alert(`Ei tilauksia kategoriassa: ${filter}`);
            return;
        }
        
        let csv = "\uFEFFPvm;Klo;Auto;Lahto;Meno;Matkustaja;Puhelin;Hinta;Tyyppi;Lasku;Tilaaja;Huomio;Poikkeamat\n";
        logsToExport.forEach(r => {
            let csvTime = formatTime(r.time);
            csv += `${cleanCSV(r.date)};${csvTime};${cleanCSV(r.car)};${cleanCSV(r.from)};${cleanCSV(r.to)};${cleanCSV(r.customer)};${cleanCSV(r.phone)};${cleanCSV(r.price)};${cleanCSV(r.type)};${cleanCSV(r.billing)};${cleanCSV(r.orderer)};${cleanCSV(r.notes)};${cleanCSV(r.deviation)}\n`;
        });
        
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${filename}.csv`;
        link.click();
    };

    window.prepareEdit = (id) => {
        const item = currentLogs.find(l => l.id === id);
        editId = id;
        document.getElementById('inPvm').value = item.date;
        document.getElementById('inKlo').value = item.time;
        document.getElementById('inAuto').value = item.car || "";
        document.getElementById('inHinta').value = item.price;
        document.getElementById('inTyyppi').value = item.type;
        document.getElementById('inFrom').value = item.from;
        document.getElementById('inTo').value = item.to;
        document.getElementById('inNimi').value = item.customer;
        document.getElementById('inPuhelin').value = item.phone || "";
        document.getElementById('inTilaaja').value = item.orderer || "";
        document.getElementById('inLasku').value = item.billing || "";
        document.getElementById('inHuomio').value = item.notes || "";
        document.getElementById('inPoikkeama').value = item.deviation || "";
        
        document.getElementById('editModeIndicator').classList.add('active');
        document.getElementById('btnSave').textContent = "PÄIVITÄ TILAUS";
        document.getElementById('btnSave').classList.add('edit-mode');
        document.getElementById('btnCancel').classList.add('show');
        document.getElementById('msgInput').value = '';
        
        window.scrollTo(0, 0);
    };

    window.cancelEdit = () => {
        editId = null;
        document.getElementById('editModeIndicator').classList.remove('active');
        document.getElementById('btnSave').textContent = "TALLENNA TILAUS";
        document.getElementById('btnSave').classList.remove('edit-mode');
        document.getElementById('btnCancel').classList.remove('show');
        document.getElementById('msgInput').value = '';
        document.querySelectorAll('.manual-fields input').forEach(i => i.value = '');
    };

    document.getElementById('btnSave').onclick = async () => {
        const txt = document.getElementById('msgInput').value;
        const hinta = document.getElementById('inHinta').value;
        const rawTime = document.getElementById('inKlo').value;
        
        let phoneVal = document.getElementById('inPuhelin').value;
        if (!editId && !phoneVal) {
            let phoneMatch = txt.match(/(\+?\d[\d\s-]{8,15})/)?.[0] || '';
            phoneVal = phoneMatch;
        }

        const data = {
            date: document.getElementById('inPvm').value,
            time: formatTime(rawTime),
            car: document.getElementById('inAuto').value,
            price: hinta,
            type: document.getElementById('inTyyppi').value,
            from: document.getElementById('inFrom').value,
            to: document.getElementById('inTo').value,
            customer: document.getElementById('inNimi').value,
            orderer: document.getElementById('inTilaaja').value,
            billing: document.getElementById('inLasku').value,
            notes: document.getElementById('inHuomio').value,
            deviation: document.getElementById('inPoikkeama').value,
            phone: phoneVal
        };
        
        if(editId) { 
            await updateDoc(doc(db, "taksitulot", editId), data);
            window.cancelEdit();
        }
        else { 
            await addDoc(collection(db, "taksitulot"), data); 
        }
        
        document.getElementById('msgInput').value = '';
        document.querySelectorAll('.manual-fields input').forEach(i => i.value = '');
    };

    document.getElementById('btnCancel').onclick = window.cancelEdit;

    window.del = (id) => { if(confirm("Poista tilaus pysyvästi?")) deleteDoc(doc(db, "taksitulot", id)); };

    // Aseta SMB tänään kaikkiin tapahtumiin
    window.setSmBToday = async () => {
        const today = new Date();
        const todayStr = `${String(today.getDate()).padStart(2, '0')}.${String(today.getMonth() + 1).padStart(2, '0')}.${today.getFullYear()}`;
        
        // Etsi kaikki tänään tapahtuvat tilaukset
        const todayLogs = currentLogs.filter(r => r.date === todayStr);
        
        if (todayLogs.length === 0) {
            alert(`Ei tapahtumia päivälle ${todayStr}`);
            return;
        }
        
        if (confirm(`Aseta SMB autoksi ${todayLogs.length} tapahtumaan päivälle ${todayStr}?`)) {
            for (const log of todayLogs) {
                await updateDoc(doc(db, "taksitulot", log.id), { car: "SMB" });
            }
            alert(`✓ SMB asetettu ${todayLogs.length} tapahtumaan`);
        }
    };

    document.getElementById('btnSetSMB').onclick = window.setSmBToday;

    // Tyhjennä koko lomake
    window.clearForm = () => {
        if (confirm("Tyhjennä kaikki kentät?")) {
            document.getElementById('msgInput').value = '';
            document.getElementById('inPvm').value = '';
            document.getElementById('inKlo').value = '';
            document.getElementById('inAuto').value = '';
            document.getElementById('inHinta').value = '';
            document.getElementById('inTyyppi').value = '';
            document.getElementById('inFrom').value = '';
            document.getElementById('inTo').value = '';
            document.getElementById('inNimi').value = '';
            document.getElementById('inPuhelin').value = '';
            document.getElementById('inTilaaja').value = '';
            document.getElementById('inLasku').value = '';
            document.getElementById('inHuomio').value = '';
            document.getElementById('inPoikkeama').value = '';
        }
    };

    document.getElementById('btnClear').onclick = window.clearForm;

    // Avaa päivämäärävälivalinta dialogi
    window.openDateRangeDialog = () => {
        document.getElementById('dateRangeDialog').style.display = 'block';
        document.getElementById('dateRangeOverlay').style.display = 'block';
        // Täytä oletusarvot: tänään - kuukauden loppu
        const today = new Date();
        const startDate = `${String(today.getDate()).padStart(2, '0')}.${String(today.getMonth() + 1).padStart(2, '0')}.${today.getFullYear()}`;
        const endDate = new Date(today.getFullYear(), today.getMonth() + 1, 0);
        const endDateStr = `${String(endDate.getDate()).padStart(2, '0')}.${String(endDate.getMonth() + 1).padStart(2, '0')}.${endDate.getFullYear()}`;
        document.getElementById('dateRangeStart').value = startDate;
        document.getElementById('dateRangeEnd').value = endDateStr;
    };

    // Sulje dialogi
    window.closeDateRangeDialog = () => {
        document.getElementById('dateRangeDialog').style.display = 'none';
        document.getElementById('dateRangeOverlay').style.display = 'none';
    };

    // Lataa CSV päivämääräväliltä
    window.exportToDateRange = () => {
        const startStr = document.getElementById('dateRangeStart').value;
        const endStr = document.getElementById('dateRangeEnd').value;
        
        if (!startStr || !endStr) {
            alert('Täytä molemmat päivämäärät (pp.kk.yyyy muodossa)');
            return;
        }
        
        // Parse päivämäärät
        const parseDateStr = (dateStr) => {
            const parts = dateStr.split('.');
            if (parts.length !== 3) return null;
            return new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
        };
        
        const startDate = parseDateStr(startStr);
        const endDate = parseDateStr(endStr);
        
        if (!startDate || !endDate) {
            alert('Virheellinen päivämäärä muoto. Käytä pp.kk.yyyy');
            return;
        }
        
        // Filtteröi tilaukset päivämäärävälin mukaan
        const filtered = currentLogs.filter(r => {
            const rDate = parseDateStr(r.date);
            return rDate && rDate >= startDate && rDate <= endDate;
        });
        
        if (filtered.length === 0) {
            alert(`Ei tilauksia ajanjaksolla ${startStr} - ${endStr}`);
            return;
        }
        
        // Luo CSV
        let csv = "\uFEFFPvm;Klo;Auto;Lahto;Meno;Matkustaja;Puhelin;Hinta;Tyyppi;Lasku;Tilaaja;Huomio;Poikkeamat\n";
        filtered.forEach(r => {
            let csvTime = formatTime(r.time);
            csv += `${cleanCSV(r.date)};${csvTime};${cleanCSV(r.car)};${cleanCSV(r.from)};${cleanCSV(r.to)};${cleanCSV(r.customer)};${cleanCSV(r.phone)};${cleanCSV(r.price)};${cleanCSV(r.type)};${cleanCSV(r.billing)};${cleanCSV(r.orderer)};${cleanCSV(r.notes)};${cleanCSV(r.deviation)}\n`;
        });
        
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `ajot_${startStr}_${endStr}.csv`;
        link.click();
        
        closeDateRangeDialog();
    };
</script>

</body>
</html>
