<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuljetuskirja V36.2</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #000000; 
            --surface: #111111; 
            --border: #333333; 
            --accent: #c8f050; 
            --accent2: #50c8f0; 
            --text: #ffffff; 
            --muted: #aaaaaa; 
            --future-bg: #d4f8a0; 
            --future-text: #000000; 
            --price-bg: #ffff00; /* Kirkas keltainen */
            --price-text: #000000; /* Musta teksti keltaisella */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); padding: 10px; line-height: 1.4; }
        .v-tag { color: var(--muted); font-size: 11px; text-align: center; margin-bottom: 5px; font-weight: bold; }
        h1 { font-family: 'Syne', sans-serif; font-size: 1.2rem; text-align: center; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        textarea { width: 100%; background: var(--surface); border: 2px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px; font-family: inherit; margin-bottom: 10px; min-height: 100px; font-size: 1rem; border-left: 6px solid var(--accent); outline: none; }
        
        .manual-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; background: #1a1a1a; padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .manual-fields input { background: #000; border: 1px solid #555; color: #fff; padding: 12px; border-radius: 4px; font-family: inherit; font-size: 0.9rem; width: 100%; }
        .manual-fields input:focus { border-color: var(--accent); }
        .full-width { grid-column: span 2; }
        label { font-size: 0.7rem; color: var(--accent2); text-transform: uppercase; margin-bottom: 3px; display: block; font-weight: bold; }
        
        .btn-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-add { background: var(--accent); color: black; flex: 2; padding: 20px; border-radius: 8px; font-weight: 900; border: none; cursor: pointer; font-size: 1.1rem; text-transform: uppercase; }
        .btn-csv { background: #333; color: white; flex: 1; border-radius: 8px; border: 2px solid #444; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        
        .table-wrapper { overflow-x: auto; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 1250px; }
        th { text-align: left; color: #ffffff; padding: 15px 10px; border-bottom: 2px solid var(--accent); background: #000; text-transform: uppercase; font-weight: 900; }
        td { padding: 12px 10px; border-bottom: 1px solid #333; vertical-align: top; }
        
        .row-future { background-color: var(--future-bg) !important; color: var(--future-text) !important; }
        .row-past { background-color: #111111 !important; color: #ffffff !important; }
        
        /* HINTA-TÄGI: MAKSIMAALINEN KONTRASTI */
        .price-tag { 
            font-weight: 900; 
            color: var(--price-text); 
            background: var(--price-bg); 
            padding: 4px 8px; 
            border-radius: 4px; 
            display: inline-block;
            font-size: 1rem;
            box-shadow: 2px 2px 0px #000;
        }

        .action-btn { background: #222; border: 1px solid #444; font-size: 1.2rem; cursor: pointer; color: var(--accent2); padding: 8px; border-radius: 4px; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="v-tag">VERSIO 36.2 (MAX CONTRAST)</div>
    <h1>KULJETUSKIRJA</h1>

    <textarea id="msgInput" placeholder="LIITÄ VIESTI TÄHÄN..." oninput="parseMessage()"></textarea>
    
    <div class="manual-fields">
        <div><label>Pvm</label><input type="text" id="inPvm"></div>
        <div><label>Klo</label><input type="text" id="inKlo"></div>
        <div><label>Hinta (€)</label><input type="text" id="inHinta" style="background:#ffff00; color:#000; font-weight:bold;"></div>
        <div><label>Tyyppi</label><input type="text" id="inTyyppi"></div>
        <div class="full-width"><label>Lähtö</label><input type="text" id="inFrom"></div>
        <div class="full-width"><label>Meno</label><input type="text" id="inTo"></div>
        <div><label>Matkustaja</label><input type="text" id="inNimi"></div>
        <div><label>Tilaaja</label><input type="text" id="inTilaaja"></div>
        <div class="full-width"><label>Lasku / Maksaja</label><input type="text" id="inLasku" style="background:#000; color:#c8f050; border: 1px solid #c8f050;"></div>
        <div class="full-width"><label>Huomio</label><input type="text" id="inHuomio"></div>
        <div class="full-width"><label style="color:#f0a050">Ajon aikaiset poikkeamat</label><input type="text" id="inPoikkeama"></div>
    </div>

    <div class="btn-row">
        <button class="btn-add" id="btnSave">TALLENNA TILAUS</button>
        <button class="btn-csv" onclick="exportToCSV()">LATAA CSV</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>AIKA</th>
                    <th>REITTI</th>
                    <th>MATKUSTAJA</th>
                    <th>TILAAJA</th>
                    <th>HINTA</th>
                    <th>LASKU</th>
                    <th>HUOMIO / POIKKEAMAT</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="logs"></tbody>
        </table>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs", authDomain: "jsailing-f716c.firebaseapp.com", projectId: "jsailing-f716c", storageBucket: "jsailing-f716c.firebasestorage.app", appId: "1:543523103696:web:439a312efa6aec398a8fd5" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentLogs = [];
    let editId = null;

    onAuthStateChanged(auth, (u) => { if(u) startListening(); else signInWithPopup(auth, provider); });

    window.parseMessage = () => {
        if (editId) return;
        const txt = document.getElementById('msgInput').value;
        const lowTxt = txt.toLowerCase();
        const lines = txt.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        
        let pvmM = txt.match(/(\d{1,2})\.(\d{1,2})/);
        if (pvmM) document.getElementById('inPvm').value = pvmM[0].includes('2026') ? pvmM[0] : pvmM[0] + ".2026";
        document.getElementById('inKlo').value = txt.match(/(\d{1,2})[.:](\d{2})/)?.[0] || "";
        
        const hintaMatch = txt.match(/(\d{1,3})\s*[e€]/i);
        const hintaStr = hintaMatch ? hintaMatch[1] : "";
        document.getElementById('inHinta').value = hintaStr;
        document.getElementById('inTyyppi').value = lowTxt.includes('vip') ? 'VIP' : 'Normaali';
        
        const fIdx = lines.findIndex(l => l.toLowerCase().match(/lähtö|nouto/));
        const fromV = (fIdx !== -1 && lines[fIdx+1]) ? lines[fIdx+1] : "";
        document.getElementById('inFrom').value = fromV;

        const tIdx = lines.findIndex(l => l.toLowerCase().match(/meno|kohde/));
        const toV = (tIdx !== -1 && lines[tIdx+1]) ? lines[tIdx+1] : "";
        document.getElementById('inTo').value = toV;
        
        const nIdx = lines.findIndex(l => l.toLowerCase().match(/kyytiin/));
        let passenger = (nIdx !== -1 && lines[nIdx+1]) ? lines[nIdx+1].replace(/[\/]/g, '').replace(/\+?\d[\d\s-]{7,}/, '').trim() : "";
        document.getElementById('inNimi').value = passenger;

        const sIdx = lines.findIndex(l => l.toLowerCase().match(/tilaaja|til:|tilaus/));
        let ordererVal = "";
        if (sIdx !== -1) {
            let line = lines[sIdx];
            ordererVal = line.includes(':') ? line.split(':')[1].replace(/[\/]/g, '').trim() : (lines[sIdx+1] || "").replace(/[\/]/g, '').trim();
        }
        document.getElementById('inTilaaja').value = ordererVal;

        let billVal = "Asiakas maksaa";
        if (lowTxt.includes("fortum")) billVal = "FORTUM";
        else if (lowTxt.includes("kone")) billVal = "KONE";
        else if (lowTxt.includes("valmet")) billVal = "VALMET";
        else {
            const bIdx = lines.findIndex(l => l.toLowerCase().includes('lasku'));
            if (bIdx !== -1 && lines[bIdx+1] && !lines[bIdx+1].toLowerCase().includes('ok?')) billVal = lines[bIdx+1];
        }
        document.getElementById('inLasku').value = billVal;

        let phoneMatch = txt.match(/(\+?\d[\d\s-]{8,15})/)?.[0] || "";
        let notes = lines.filter(l => 
            !l.toLowerCase().match(/lähtö|meno|kyytiin|tilaaja|til:|lasku|ok\?|klo|nouto|kohde|huomenna/) &&
            !l.match(/(\d{1,2})\.(\d{1,2})/) && 
            l !== passenger && l !== ordererVal && l !== fromV && l !== toV && l !== billVal
        ).join(' ').replace(new RegExp(passenger, 'gi'), '').replace(new RegExp(ordererVal, 'gi'), '').replace(/\d{1,3}\s*[e€]/gi, '').replace(new RegExp(phoneMatch, 'g'), '').replace(/[\/]/g, '').replace(/\s\s+/g, ' ').trim();
        
        document.getElementById('inHuomio').value = notes;
    };

    function startListening() {
        onSnapshot(query(collection(db, "taksitulot")), (snap) => {
            const tbody = document.getElementById('logs');
            tbody.innerHTML = '';
            currentLogs = snap.docs.map(d => ({id: d.id, ...d.data()}));
            
            currentLogs.sort((a,b) => {
                const k = (i) => {
                    let p = (i.date || '01.01.2026').split('.');
                    return `${p[2]||'2026'}-${(p[1]||'01').padStart(2,'0')}-${(p[0]||'01').padStart(2,'0')}-${(i.time||'00:00').replace('.',':')}`;
                };
                return k(b).localeCompare(k(a));
            });

            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            const fragment = document.createDocumentFragment();
            currentLogs.forEach(r => {
                const tr = document.createElement('tr');
                const p = (r.date || '').split('.');
                const rD = new Date(parseInt(p[2]||2026), parseInt(p[1]||1)-1, parseInt(p[0]||1));
                tr.className = rD >= today ? 'row-future' : 'row-past';
                
                tr.innerHTML = `
                    <td><b style="font-size:1rem">${r.date}</b><br><b style="color:var(--accent2)">${r.time}</b></td>
                    <td><b>${r.from}</b><br>⬇<br><b>${r.to}</b></td>
                    <td><b style="font-size:0.9rem; color:#fff">${r.customer}</b><br><small>${r.phone || ''}</small></td>
                    <td>${r.orderer || '-'}</td>
                    <td><span class="price-tag">${r.price}€</span><br><b>${r.type}</b></td>
                    <td><b style="color:var(--accent)">${r.billing || 'Asiakas maksaa'}</b></td>
                    <td><small><b>HUO:</b> ${r.notes || '-'}<br><b style="color:#ff4444">POIK:</b> ${r.deviation || '-'}</small></td>
                    <td>
                        <button class="action-btn" onclick="window.prepareEdit('${r.id}')">✎</button>
                        <button class="action-btn" onclick="window.del('${r.id}')">✕</button>
                    </td>
                `;
                fragment.appendChild(tr);
            });
            tbody.appendChild(fragment);
        });
    }

    const cleanCSV = (str) => {
        if (!str) return "";
        return str.toString().replace(/;/g, ',').replace(/(\r\n|\n|\r)/gm, " ").trim();
    };

    window.exportToCSV = () => {
        let csv = "\uFEFFPvm;Klo;Lahto;Meno;Matkustaja;Puhelin;Hinta;Tyyppi;Lasku;Tilaaja;Huomio;Poikkeamat\n";
        currentLogs.forEach(r => {
            csv += `${cleanCSV(r.date)};${cleanCSV(r.time)};${cleanCSV(r.from)};${cleanCSV(r.to)};${cleanCSV(r.customer)};${cleanCSV(r.phone)};${cleanCSV(r.price)};${cleanCSV(r.type)};${cleanCSV(r.billing)};${cleanCSV(r.orderer)};${cleanCSV(r.notes)};${cleanCSV(r.deviation)}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `ajot_${new Date().toLocaleDateString()}.csv`;
        link.click();
    };

    window.prepareEdit = (id) => {
        const item = currentLogs.find(l => l.id === id);
        editId = id;
        document.getElementById('inPvm').value = item.date;
        document.getElementById('inKlo').value = item.time;
        document.getElementById('inHinta').value = item.price;
        document.getElementById('inTyyppi').value = item.type;
        document.getElementById('inFrom').value = item.from;
        document.getElementById('inTo').value = item.to;
        document.getElementById('inNimi').value = item.customer;
        document.getElementById('inTilaaja').value = item.orderer || "";
        document.getElementById('inLasku').value = item.billing || "";
        document.getElementById('inHuomio').value = item.notes;
        document.getElementById('inPoikkeama').value = item.deviation || "";
        window.scrollTo(0,0);
    };

    document.getElementById('btnSave').onclick = async () => {
        const txt = document.getElementById('msgInput').value;
        const hinta = document.getElementById('inHinta').value;
        let phoneMatch = txt.match(/(\+?\d[\d\s-]{8,15})/)?.[0] || '-';
        let cleanPhone = phoneMatch.replace(hinta, '').trim();

        const data = {
            date: document.getElementById('inPvm').value,
            time: document.getElementById('inKlo').value,
            price: hinta,
            type: document.getElementById('inTyyppi').value,
            from: document.getElementById('inFrom').value,
            to: document.getElementById('inTo').value,
            customer: document.getElementById('inNimi').value,
            orderer: document.getElementById('inTilaaja').value,
            billing: document.getElementById('inLasku').value,
            notes: document.getElementById('inHuomio').value,
            deviation: document.getElementById('inPoikkeama').value,
            phone: editId ? (currentLogs.find(l => l.id === editId)?.phone || '-') : (cleanPhone === '-' ? '-' : cleanPhone)
        };
        
        if(editId) { await updateDoc(doc(db, "taksitulot", editId), data); editId = null; }
        else { await addDoc(collection(db, "taksitulot"), data); }
        
        document.getElementById('msgInput').value = '';
        document.querySelectorAll('.manual-fields input').forEach(i => i.value = '');
    };

    window.del = (id) => { if(confirm("Poista tilaus pysyvästi?")) deleteDoc(doc(db, "taksitulot", id)); };
</script>
</body>
</html>
