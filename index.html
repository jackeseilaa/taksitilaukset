<script type="module">
    // ... (Firebase-alustukset säilyvät samoina) ...

    document.getElementById('btnAdd').onclick = async () => {
        const text = document.getElementById('msgInput').value;
        if(!text) return;
        
        // Puhdistetaan viesti ja jaetaan riveihin
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        
        // Apufunktio: Etsii rivin, joka sisältää hakusanan, ja palauttaa SEURAAVAN rivin
        const getNextLine = (keyword) => {
            const idx = lines.findIndex(l => l.toLowerCase().includes(keyword.toLowerCase()));
            return (idx !== -1 && lines[idx+1]) ? lines[idx+1] : '—'; // Jos ei löydy, laitetaan viiva
        };

        // Apufunktio: Etsii rivin, joka ALKAA hakusanalla (esim. "Nimi:")
        const getValueAfter = (keyword) => {
            const line = lines.find(l => l.toLowerCase().startsWith(keyword.toLowerCase()));
            return line ? line.split(':').slice(1).join(':').trim() : '—';
        };

        const data = {
            date: text.match(/(\d{1,2})\.(\d{1,2})/)?.[0] || '—',
            time: text.match(/(\d{1,2})[.:](\d{2})/)?.[0] || '—',
            from: getNextLine('Lähtö'),
            to: getNextLine('Meno'),
            customer: getValueAfter('Nimi'),
            phone: text.match(/\+?\d{8,15}/)?.[0] || '—',
            price: text.match(/(\d+)\s*[e€]/i)?.[1] || '0',
            type: text.toLowerCase().includes('vip') ? 'VIP' : 'Normaali',
            notes: lines.find(l => l.toLowerCase().includes('odotusta')) || '—',
            billing: getNextLine('Laskulle'),
            booker: getNextLine('Tilaaja'),
            createdAt: new Date()
        };

        await addDoc(collection(db, "taksitulot"), data);
        document.getElementById('msgInput').value = '';
    };

    // ... (Loput skriptistä säilyy samana) ...
</script>
