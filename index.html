<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V18 - FINAL</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 15vh; }
        .v-badge { border: 2px solid #c8f050; color: #c8f050; padding: 10px; display: inline-block; margin-bottom: 20px; font-weight: bold; }
        .btn { 
            display: none; padding: 25px; border-radius: 50px; width: 85%; max-width: 350px;
            font-weight: 900; font-size: 1.3rem; text-decoration: none; margin: 20px auto;
            border: 4px solid #fff; text-transform: uppercase;
        }
        #loginBtn { background: #fff; color: #000; }
        #goLink { background: #c8f050; color: #000; display: none; }
        #msg { margin: 20px; color: #666; }
    </style>
</head>
<body>

    <div class="v-badge">VERSIO 18.0</div>
    <h1 id="status">ALUSTETAAN...</h1>

    <button id="loginBtn" class="btn">1. KIRJAUDU SISÄÄN</button>
    
    <a id="goLink" href="https://jackeseilaa.github.io/taksitilaukset/" target="_blank" class="btn">
       2. AVAA TAKSITILAUKSET
    </a>

    <div id="msg"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithRedirect, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        const lBtn = document.getElementById('loginBtn');
        const gLink = document.getElementById('goLink');
        const status = document.getElementById('status');

        if (user && user.email === "jacke.seilaa@gmail.com") {
            status.innerText = "TUNNISTETTU";
            status.style.color = "#c8f050";
            lBtn.style.display = "none";
            gLink.style.display = "block";
            document.getElementById('msg').innerText = "Käyttäjä: " + user.email;
        } else {
            status.innerText = "KIRJAUDU SISÄÄN";
            lBtn.style.display = "block";
            gLink.style.display = "none";
        }
    });

    document.getElementById('loginBtn').onclick = () => {
        signInWithRedirect(auth, new GoogleAuthProvider());
    };
</script>
</body>
</html>
