<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuljetuskirja</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: sans-serif; text-align: center; padding-top: 15vh; margin: 0; }
        .btn-fix { 
            background: #fff; color: #000; padding: 20px 40px; 
            border-radius: 50px; font-weight: 900; font-size: 1.2rem; 
            border: 4px solid #c8f050; cursor: pointer; text-decoration: none;
            display: inline-block; box-shadow: 0 0 20px rgba(200, 240, 80, 0.4);
        }
        #status { margin-top: 30px; color: #888; font-family: monospace; font-size: 0.8rem; }
        .version { color: #333; font-size: 0.7rem; margin-top: 50px; }
    </style>
</head>
<body>

    <h1 style="color: #c8f050; font-size: 2.5rem;">KULJETUSKIRJA</h1>
    <p style="margin-bottom: 40px; color: #aaa;">iPad Safari -optimoitu</p>

    <button id="startBtn" class="btn-fix">KIRJAUDU TÄSTÄ</button>

    <div id="status">Tila: Odottaa klikkausta</div>
    <div class="version">Versio 1.2 - Safari Fix</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Pakotetaan Firebase muistamaan kirjautuminen iPadilla paremmin
    setPersistence(auth, browserLocalPersistence);

    document.getElementById('startBtn').onclick = async (e) => {
        e.preventDefault();
        document.getElementById('status').innerText = "Valmistellaan ikkunaa...";
        
        try {
            // Safari vaatii, että tämä tapahtuu täsmälleen klikkauksesta
            await signInWithPopup(auth, provider);
        } catch (error) {
            console.error(error);
            document.getElementById('status').innerText = "Virhe: " + error.code;
            
            if (error.code === 'auth/popup-blocked') {
                alert("Salli ponnahdusikkunat Safarin asetuksista!");
            }
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "jacke.seilaa@gmail.com") {
            document.body.innerHTML = `
                <div style="padding: 50px;">
                    <h1 style="color:#c8f050">TERVETULOA</h1>
                    <p>Kirjautuminen onnistui!</p>
                    <button onclick="window.location.href='https://jackeseilaa.github.io/taksitilaukset/'" 
                            style="padding:15px 30px; background:#c8f050; color:#000; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">
                        AVAA TAKSITILAUKSET TÄSTÄ
                    </button>
                </div>`;
        }
    });
</script>

</body>
</html>
