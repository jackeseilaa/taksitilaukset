<script type="module">
    // ... (Firebase-alustukset ja muut säilyvät ennallaan) ...

    function startListening() {
        // MUUTOS: Haetaan kaikki, mutta pidetään järjestys vakaana
        const q = query(collection(db, "taksitulot"), orderBy("driveTimestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';
            currentLogs = [];
            
            // Jos driveTimestamp puuttuu, ne tulevat silti listalle
            snapshot.forEach(d => {
                const r = d.data();
                currentLogs.push({id: d.id, ...r});
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${r.date || '—'}</b><br>${r.time || '—'}</td>
                    <td><small>LÄHTÖ:</small> ${r.from || '—'}<br><small>MENO:</small> ${r.to || '—'}</td>
                    <td>${r.customer || '—'}<br><small>${r.phone || ''}</small></td>
                    <td><span class="price-text">${r.price || '0'}€</span><br><small>${r.type || ''}</small></td>
                    <td>${r.billing || '—'}<br><small>${r.booker || ''}</small></td>
                    <td><small>${r.notes || ''}</small></td>
                    <td>
                        <button class="edit-btn" data-id="${d.id}" style="background:none; border:none; color:var(--edit); cursor:pointer;">✎</button>
                        <button class="del-btn" data-id="${d.id}" style="background:none; border:none; color:#f05050; cursor:pointer;">✕</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            
            // Rebindataan napit
            document.querySelectorAll('.edit-btn').forEach(btn => btn.onclick = () => prepareEdit(btn.dataset.id));
            document.querySelectorAll('.del-btn').forEach(btn => btn.onclick = () => confirm("Poistetaanko?") && deleteDoc(doc(db, "taksitulot", btn.dataset.id)));
        });
    }
    // ... (loppukoodi säilyy samana) ...
</script>
