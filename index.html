<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuljetuskirja V12</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 20vh; margin: 0; }
        .container { padding: 20px; }
        .v-badge { background: #333; color: #eee; padding: 4px 10px; border-radius: 10px; font-size: 12px; margin-bottom: 20px; display: inline-block; }
        
        /* Napit pidetään täysin erillään */
        #login-section, #auth-section { display: none; }

        .btn { 
            display: block; padding: 25px; border-radius: 50px; width: 100%; max-width: 320px;
            font-weight: 900; font-size: 1.4rem; cursor: pointer;
            text-transform: uppercase; margin: 20px auto; text-decoration: none;
        }
        .white { background: #fff; color: #000; border: 4px solid #c8f050; }
        .green { background: #c8f050; color: #000; border: 4px solid #fff; }
        
        #status { color: #c8f050; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="v-badge">VERSIO 12.0</div>
    
    <div id="status">Ladataan...</div>

    <div id="login-section">
        <h1 style="color:#fff;">KULJETUSKIRJA</h1>
        <button id="startBtn" class="btn white">KIRJAUDU SISÄÄN</button>
    </div>

    <div id="auth-section">
        <h1 style="color:#c8f050;">PÄÄSY SALLITTU</h1>
        <a href="https://jackeseilaa.github.io/taksitilaukset/" class="btn green">AVAA TAKSITILAUKSET</a>
        <p id="userMail" style="color:#555; font-size:12px;"></p>
        <button onclick="signOutNow()" style="background:none; border:none; color:#333; margin-top:50px; text-decoration:underline;">Kirjaudu ulos</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithRedirect, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const logSec = document.getElementById('login-section');
    const authSec = document.getElementById('auth-section');
    const stat = document.getElementById('status');

    // SEURANTA
    onAuthStateChanged(auth, (user) => {
        stat.style.display = "none"; // Piilota "Ladataan"

        if (user && user.email === "jacke.seilaa@gmail.com") {
            logSec.style.display = "none";
            authSec.style.display = "block";
            document.getElementById('userMail').innerText = user.email;
        } else {
            logSec.style.display = "block";
            authSec.style.display = "none";
            if(user) signOut(auth); // Jos väärä käyttäjä, ulos.
        }
    });

    // KIRJAUTUMINEN
    document.getElementById('startBtn').onclick = () => {
        stat.style.display = "block";
        stat.innerText = "YHDISTETÄÄN GOOGLEEN...";
        signInWithRedirect(auth, provider);
    };

    // ULOSKIRJAUS
    window.signOutNow = () => {
        signOut(auth).then(() => location.reload());
    };
</script>
</body>
</html>
