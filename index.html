<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuljetuskirja V33.7</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0f0f; --surface: #1a1a1a; --border: #2e2e2e; --accent: #c8f050; --accent2: #50c8f0; --text: #f0f0f0; --muted: #666; --edit: #f0a050; --future-bg: #d4f8a0; --future-text: #000000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); padding: 10px; }
        .v-tag { color: var(--muted); font-size: 10px; text-align: center; margin-bottom: 5px; }
        h1 { font-family: 'Syne', sans-serif; font-size: 1.2rem; text-align: center; color: var(--accent); margin-bottom: 15px; text-transform: uppercase; }
        #auth-section { text-align: center; padding: 100px 20px; }
        #app-content { display: none; }
        .btn-login { background: white; color: black; padding: 18px 30px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; font-family: inherit; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.7rem; color: var(--muted); }
        textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px; font-family: inherit; margin-bottom: 10px; min-height: 80px; outline: none; font-size: 0.9rem; border-left: 4px solid var(--accent); }
        
        /* KENTÄT AINA NÄKYVISSÄ */
        .manual-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; background: #222; padding: 12px; border-radius: 8px; border: 1px solid var(--border); }
        .manual-fields input { background: #000; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px; font-family: inherit; font-size: 0.85rem; width: 100%; }
        .full-width { grid-column: span 2; }
        label { grid-column: span 2; font-size: 0.6rem; color: var(--accent2); text-transform: uppercase; margin-top: 4px; }

        .btn-add { background: var(--accent); color: black; width: 100%; padding: 18px; border-radius: 8px; font-weight: 800; border: none; margin-bottom: 15px; cursor: pointer; font-size: 1.1rem; }
        .btn-update { background: var(--edit) !important; color: white !important; }
        .table-wrapper { overflow-x: auto; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; min-width: 950px; }
        th { text-align: left; color: var(--accent2); padding: 12px; border-bottom: 1px solid var(--border); background: #222; }
        td { padding: 12px; border-bottom: 1px solid #222; vertical-align: top; }
        .day-separator { border-top: 5px solid var(--accent2) !important; }
        .row-future { background-color: var(--future-bg) !important; color: var(--future-text) !important; }
        .row-past { opacity: 0.6; }
        .price-tag { font-weight: bold; color: var(--accent); border: 1px solid rgba(200,240,80,0.3); padding: 2px 4px; border-radius: 4px; }
        .action-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; padding: 4px; }
    </style>
</head>
<body>
    <div class="v-tag">VERSIO 33.7 (STABLE)</div>
    <div id="auth-section"><h1>KULJETUSKIRJA</h1><button class="btn-login" id="btnLogin">KIRJAUDU SISÄÄN</button></div>

    <div id="app-content">
        <div class="top-bar"><span id="userEmail"></span><button id="btnLogout" style="background:none; color:inherit; border:none; text-decoration:underline;">Ulos</button></div>
        
        <textarea id="msgInput" placeholder="Liitä WhatsApp-viesti tästä..." oninput="autoParse()"></textarea>
        
        <div class="manual-fields">
            <label>Pvm & Vuosi</label>
            <input type="text" id="editDate" placeholder="23.4.">
            <input type="text" id="editYear" placeholder="2026">
            <label>Klo & Hinta (€)</label>
            <input type="text" id="editTime" placeholder="12.30">
            <input type="text" id="editPrice" placeholder="50">
            <label>Asiakas & Laskutus</label>
            <input type="text" id="editCust" placeholder="Nimi" class="full-width">
            <input type="text" id="editBill" placeholder="Lasku (esim. Kela, Kunta tai —)" class="full-width">
        </div>

        <button class="btn-add" id="btnAdd">TALLENNA TILAUS</button>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Pvm/Klo</th><th>Nouto / Kohde</th><th>Asiakas</th><th>Hinta</th><th>Lasku</th><th>Huomio</th><th></th></tr></thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs", authDomain: "jsailing-f716c.firebaseapp.com", projectId: "jsailing-f716c", storageBucket: "jsailing-f716c.firebasestorage.app", messagingSenderId: "543523103696", appId: "1:543523103696:web:439a312efa6aec398a8fd5" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentLogs = [];
    let editId = null;

    onAuthStateChanged(auth, (user) => {
        if (user) { document.getElementById('auth-section').style.display = 'none'; document.getElementById('app-content').style.display = 'block'; document.getElementById('userEmail').innerText = user.email; startListening(); }
        else { document.getElementById('auth-section').style.display = 'block'; document.getElementById('app-content').style.display = 'none'; }
    });

    document.getElementById('btnLogin').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btnLogout').onclick = () => signOut(auth);

    // AUTOMAATTINEN POIMINTA KIRJOITTAESSA
    window.autoParse = () => {
        if (editId) return; // Älä ylikirjoita jos ollaan muokkaustilassa
        const text = document.getElementById('msgInput').value;
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        if (lines.length === 0) return;

        document.getElementById('editDate').value = (text.match(/(\d{1,2})\.(\d{1,2})/) ? text.match(/(\d{1,2})\.(\d{1,2})/)[0] + "." : "23.4.");
        document.getElementById('editYear').value = "2026";
        document.getElementById('editTime').value = (text.match(/(\d{1,2})[.:](\d{2})/) ? text.match(/(\d{1,2})[.:](\d{2})/)[0] : "00:00");
        document.getElementById('editPrice').value = (text.match(/(?<!\d)(\d{1,3})\s*[e€]/i)?.[1] || "0");
        
        let foundName = lines.find(l => l.toLowerCase().includes('kyytiin') || l.toLowerCase().includes('asiakas'))?.split(':')[1]?.trim();
        if (!foundName) foundName = lines.find(l => l.length > 3 && !l.includes(':') && !/\d/.test(l));
        document.getElementById('editCust').value = foundName || "—";
        
        document.getElementById('editBill').value = (text.toLowerCase().includes('lasku') ? (text.split(/lasku/i)[1]?.split('\n')[0].replace(':','').trim() || 'Lasku') : '—');
    };

    function startListening() {
        onSnapshot(query(collection(db, "taksitulot")), (snapshot) => {
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';
            currentLogs = [];
            snapshot.forEach(d => currentLogs.push({id: d.id, ...d.data()}));
            currentLogs.sort((a, b) => {
                const getSortKey = (i) => `${i.year || "2026"}-${(i.date||"01.01.").split('.')[1].padStart(2,'0')}-${(i.date||"01.01.").split('.')[0].padStart(2,'0')}-${(i.time||"00.00").replace('.',':')}`;
                return getSortKey(b).localeCompare(getSortKey(a));
            });
            let lastDateStr = "";
            currentLogs.forEach(r => {
                let separator = (lastDateStr !== "" && r.date !== lastDateStr) ? "day-separator" : "";
                lastDateStr = r.date;
                const tr = document.createElement('tr');
                tr.className = separator;
                tr.innerHTML = `<td><b>${r.date}${r.year||''}</b><br>${r.time}</td><td><small>N:</small> ${r.from}<br><small>K:</small> ${r.to}</td><td>${r.customer || '—'}<br><small>${r.phone||''}</small></td><td><span class="price-tag">${r.price}€</span><br><small>${r.type}</small></td><td>${r.billing||'—'}</td><td><small>${r.notes}</small></td><td><button class="action-btn" onclick="window.prepareEdit('${r.id}')">✎</button><button class="action-btn" onclick="window.deleteItem('${r.id}')">✕</button></td>`;
                tbody.appendChild(tr);
            });
        });
    }

    window.prepareEdit = (id) => {
        const item = currentLogs.find(l => l.id === id);
        if(!item) return;
        editId = id;
        document.getElementById('editDate').value = item.date;
        document.getElementById('editYear').value = item.year || "2026";
        document.getElementById('editTime').value = item.time;
        document.getElementById('editPrice').value = item.price;
        document.getElementById('editCust').value = item.customer || "";
        document.getElementById('editBill').value = item.billing || "";
        document.getElementById('msgInput').value = `Nouto: ${item.from}\nKohde: ${item.to}\nPuh: ${item.phone}\nHuomio: ${item.notes}`;
        document.getElementById('btnAdd').innerText = "PÄIVITÄ TILAUS";
        document.getElementById('btnAdd').classList.add('btn-update');
        window.scrollTo(0,0);
    };

    window.deleteItem = (id) => { if(confirm("Poista?")) deleteDoc(doc(db, "taksitulot", id)); };

    document.getElementById('btnAdd').onclick = async () => {
        const text = document.getElementById('msgInput').value;
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        
        const data = {
            date: document.getElementById('editDate').value,
            year: document.getElementById('editYear').value,
            time: document.getElementById('editTime').value,
            price: document.getElementById('editPrice').value,
            customer: document.getElementById('editCust').value,
            billing: document.getElementById('editBill').value,
            from: lines.find(l => l.toLowerCase().includes('nouto') || l.toLowerCase().includes('lähtö'))?.split(':').pop().trim() || lines[0] || '—',
            to: lines.find(l => l.toLowerCase().includes('kohde') || l.toLowerCase().includes('meno'))?.split(':').pop().trim() || lines[1] || '—',
            phone: text.match(/(\+?\d[\d\s-]{8,15})/)?.[0] || '—',
            type: text.toLowerCase().includes('vip') ? 'VIP' : 'Normaali',
            notes: lines.find(l => ['odotus','huomio','mittari'].some(k => l.toLowerCase().includes(k))) || '—'
        };

        if(editId) { await updateDoc(doc(db, "taksitulot", editId), data); editId = null; document.getElementById('btnAdd').innerText = "TALLENNA TILAUS"; document.getElementById('btnAdd').classList.remove('btn-update'); }
        else { await addDoc(collection(db, "taksitulot"), data); }
        document.getElementById('msgInput').value = '';
        document.querySelectorAll('.manual-fields input').forEach(i => i.value = '');
    };
</script>
</body>
</html>
