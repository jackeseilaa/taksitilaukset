<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuljetuskirja</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: sans-serif; text-align: center; padding-top: 15vh; margin: 0; }
        .btn-fix { 
            background: #fff; color: #000; padding: 20px 40px; 
            border-radius: 50px; font-weight: 900; font-size: 1.2rem; 
            border: 4px solid #c8f050; cursor: pointer; text-decoration: none;
            display: inline-block; box-shadow: 0 0 20px rgba(200, 240, 80, 0.4);
        }
        #status { margin-top: 30px; color: #888; font-family: monospace; }
        .version-tag { color: #444; font-size: 0.7rem; margin-top: 20px; }
    </style>
</head>
<body>

    <h1 style="color: #c8f050; font-size: 2.5rem; margin-bottom: 10px;">KULJETUSKIRJA</h1>
    <p style="margin-bottom: 40px; color: #aaa;">iPad-yhteys varmistettu</p>

    <button id="startBtn" class="btn-fix">KIRJAUDU TÄSTÄ</button>

    <div id="status">Tila: Odottaa klikkausta</div>
    <div class="version-tag">Versio 1.1 (Kohde: /taksitilaukset/)</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    document.getElementById('startBtn').onclick = (e) => {
        e.preventDefault();
        signInWithPopup(auth, provider)
            .then((result) => handleUserLogin(result.user))
            .catch((err) => { document.getElementById('status').innerText = "Virhe: " + err.message; });
    };

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "jacke.seilaa@gmail.com") {
            handleUserLogin(user);
        }
    });

    function handleUserLogin(user) {
        // TÄMÄ ON SE KRIITTINEN OSOITE
        const kohdeOsoite = "https://jackeseilaa.github.io/taksitilaukset/";
        
        document.body.innerHTML = `
            <div style="padding: 50px; text-align: center;">
                <h1 style="color:#c8f050">PÄÄSY SALLITTU</h1>
                <p>Tervetuloa, Jacke.</p>
                <div style="margin-top:30px;">
                    <button onclick="window.location.replace('${kohdeOsoite}')" 
                            style="padding:15px 30px; background:#c8f050; color:#000; border:none; border-radius:10px; cursor:pointer; font-weight:bold; font-size:1.1rem;">
                        AVAA TAKSITILAUKSET
                    </button>
                </div>
                <p style="margin-top:20px; color:#555; font-size:0.8rem;">Kohde: ${kohdeOsoite}</p>
            </div>`;
    }
</script>

</body>
</html>
