<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuljetuskirja</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: sans-serif; text-align: center; padding-top: 15vh; margin: 0; }
        .btn-fix { 
            background: #fff; color: #000; padding: 25px 50px; 
            border-radius: 50px; font-weight: 900; font-size: 1.4rem; 
            border: 4px solid #c8f050; cursor: pointer;
            box-shadow: 0 0 30px rgba(200, 240, 80, 0.3);
        }
        .v-tag { color: #333; font-size: 0.7rem; margin-top: 50px; }
    </style>
</head>
<body>

    <h1 style="color: #c8f050; font-size: 2.5rem;">KULJETUSKIRJA</h1>
    <p style="margin-bottom: 40px; color: #aaa;">Pääsy varmistettuun väylään</p>

    <button id="startBtn" class="btn-fix">KIRJAUDU TÄSTÄ</button>

    <div id="status" style="margin-top:20px; color:#c8f050;">Valmis</div>
    <div class="v-tag">Versio 1.4 (Final Fix)</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    getRedirectResult(auth).catch((error) => {
        console.error(error);
    });

    document.getElementById('startBtn').onclick = () => {
        document.getElementById('status').innerText = "Siirrytään Googleen...";
        signInWithRedirect(auth, provider);
    };

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "jacke.seilaa@gmail.com") {
            // TÄMÄ OSA ON NYT KORJATTU
            document.body.innerHTML = `
                <div style="padding: 50px;">
                    <h1 style="color:#c8f050; font-size: 3.5rem;">TERVETULOA</h1>
                    <p style="font-size: 1.2rem;">Jacke, yhteys on auki.</p>
                    <button id="goBtn" 
                            style="padding:25px 50px; background:#c8f050; color:#000; border:none; border-radius:15px; cursor:pointer; font-weight:bold; font-size:1.5rem; margin-top:30px;">
                        AVAA TAKSITILAUKSET
                    </button>
                </div>`;
            
            document.getElementById('goBtn').onclick = () => {
                window.location.href = 'https://jackeseilaa.github.io/taksitilaukset/';
            };
        }
    });
</script>

</body>
</html>
