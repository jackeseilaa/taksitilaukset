<script type="module">
    // ... (Firebase-asetukset säilyvät samoina) ...

    document.getElementById('btnAdd').onclick = async () => {
        const text = document.getElementById('msgInput').value;
        if(!text) return;
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        
        // Apufunktio useille avainsanoille
        const getSmartVal = (keywords) => {
            const i = lines.findIndex(l => keywords.some(k => l.toLowerCase().includes(k.toLowerCase())));
            if (i === -1) return null;
            // Jos rivillä on kaksoispiste, otetaan sen jälkeinen osa
            if (lines[i].includes(':')) return lines[i].split(':').slice(1).join(':').trim().replace(/[\/]/g, '');
            // Muuten otetaan seuraava rivi
            return lines[i+1] || '—';
        };

        // Etsitään lennonnumero (esim. AY123, SK456, LH789)
        const flightMatch = text.match(/([A-Z]{2,3}\s?\d{1,4})/i);
        
        // Määritetään lähtöpaikka (Lähtö, Nouto, Noutopaikka tai Lennonnumero)
        let nouto = getSmartVal(['Lähtö', 'Nouto', 'Noutopaikka']);
        if (flightMatch && (!nouto || nouto === '—')) {
            nouto = "Lento: " + flightMatch[0].toUpperCase();
        }

        const dateMatch = text.match(/(\d{1,2})\.(\d{1,2})/);
        const timeMatch = text.match(/(\d{1,2})[.:](\d{2})/);
        let driveDate = new Date();
        
        if (text.toLowerCase().includes('huomenna')) driveDate.setDate(driveDate.getDate() + 1);
        if (dateMatch) { driveDate.setDate(parseInt(dateMatch[1])); driveDate.setMonth(parseInt(dateMatch[2]) - 1); }
        if (timeMatch) driveDate.setHours(parseInt(timeMatch[1]), parseInt(timeMatch[2]), 0);

        const data = {
            date: dateMatch ? dateMatch[0] : (text.toLowerCase().includes('huomenna') ? 'Huomenna' : 'Tänään'),
            time: timeMatch ? timeMatch[0] : '—',
            from: nouto || '—',
            to: getSmartVal(['Meno', 'Kohde', 'Määränpää']),
            customer: getSmartVal(['Nimi', 'Kyytiin', 'Matkustaja']),
            phone: text.match(/(\+?\d[\d\s]{7,15})/)?.[0] || '—',
            price: text.match(/(\d+)\s*[e€]/i)?.[1] || '0',
            type: text.toLowerCase().includes('vip') ? 'VIP' : 'Normaali',
            notes: lines.find(l => l.toLowerCase().includes('odotus') || l.toLowerCase().includes('huomio')) || '—',
            billing: getSmartVal(['Laskulle', 'Maksutapa']),
            booker: getSmartVal(['Tilaaja']).replace(/[\/]/g, '').trim(),
            driveTimestamp: driveDate.getTime(),
            updatedAt: serverTimestamp()
        };

        if(editId) {
            await updateDoc(doc(db, "taksitulot", editId), data);
            editId = null;
            document.getElementById('btnAdd').innerText = "TALLENNA TILAUS";
            document.getElementById('btnAdd').classList.remove('btn-update');
        } else {
            data.createdAt = serverTimestamp();
            await addDoc(collection(db, "taksitulot"), data);
        }
        document.getElementById('msgInput').value = '';
    };
    
    // ... (loppukoodi kuten 31.2:ssa) ...
</script>
