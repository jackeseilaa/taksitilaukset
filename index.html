<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuljetuskirja V13</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 15vh; }
        .v-badge { color: #444; font-size: 12px; margin-bottom: 20px; }
        .btn-green { 
            display: inline-block; background: #c8f050; color: #000; 
            padding: 25px 50px; border-radius: 50px; 
            font-weight: 900; font-size: 1.4rem; text-decoration: none;
            border: 4px solid #fff;
        }
        #auth-ui { display: none; }
        #login-ui { display: none; }
        .direct-link { color: #c8f050; margin-top: 40px; display: block; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="v-badge">VERSIO 13.0</div>

    <div id="login-ui">
        <h1>KULJETUSKIRJA</h1>
        <button id="loginBtn" style="padding:20px; border-radius:50px; font-weight:bold; cursor:pointer;">KIRJAUDU SISÄÄN</button>
    </div>

    <div id="auth-ui">
        <h1 style="color:#c8f050;">PÄÄSY SALLITTU</h1>
        <br><br>
        
        <a href="https://jackeseilaa.github.io/taksitilaukset/" class="btn-green">
            AVAA TAKSITILAUKSET
        </a>

        <br><br>
        <a href="https://jackeseilaa.github.io/taksitilaukset/" class="direct-link">
            Eikö nappi toimi? Klikkaa tästä suoraan.
        </a>
        
        <p id="user" style="color:#333; margin-top:100px; font-size:10px;"></p>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithRedirect, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "jacke.seilaa@gmail.com") {
            document.getElementById('auth-ui').style.display = 'block';
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('user').innerText = user.email;
        } else {
            document.getElementById('login-ui').style.display = 'block';
            document.getElementById('auth-ui').style.display = 'none';
        }
    });

    document.getElementById('loginBtn').onclick = () => {
        signInWithRedirect(auth, new GoogleAuthProvider());
    };
</script>
</body>
</html>
