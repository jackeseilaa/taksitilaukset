<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuljetuskirja V33.1</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f0f0f; --surface: #1a1a1a; --border: #2e2e2e; 
            --accent: #c8f050; --accent2: #50c8f0; --text: #f0f0f0; --muted: #666; 
            --edit: #f0a050; --future-bg: #d4f8a0; --future-text: #000000;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); padding: 10px; }
        .v-tag { color: var(--muted); font-size: 10px; text-align: center; margin-bottom: 5px; }
        h1 { font-family: 'Syne', sans-serif; font-size: 1.2rem; text-align: center; color: var(--accent); margin-bottom: 15px; text-transform: uppercase; }
        #auth-section { text-align: center; padding: 100px 20px; }
        .btn-login { background: white; color: black; padding: 18px 30px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; }
        #app-content { display: none; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.7rem; color: var(--muted); }
        textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px; font-family: inherit; margin-bottom: 10px; min-height: 120px; outline: none; font-size: 0.9rem; border-left: 4px solid var(--accent); }
        .edit-fields { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; background: #222; padding: 10px; border-radius: 8px; border: 1px solid var(--edit); }
        .edit-fields input { background: #000; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; font-family: inherit; font-size: 0.8rem; }
        .btn-add { background: var(--accent); color: black; width: 100%; padding: 18px; border-radius: 8px; font-weight: 800; border: none; margin-bottom: 15px; cursor: pointer; font-size: 1.1rem; }
        .btn-update { background: var(--edit) !important; color: white !important; }
        .table-wrapper { overflow-x: auto; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; min-width: 950px; }
        th { text-align: left; color: var(--accent2); padding: 12px; border-bottom: 1px solid var(--border); background: #222; }
        td { padding: 12px; border-bottom: 1px solid #222; vertical-align: top; line-height: 1.4; }
        .day-separator { border-top: 5px solid var(--accent2) !important; }
        .row-future { background-color: var(--future-bg) !important; color: var(--future-text) !important; }
        .row-past { opacity: 0.6; }
        .price-tag { font-weight: bold; color: var(--accent); border: 1px solid rgba(200,240,80,0.3); padding: 2px 4px; border-radius: 4px; }
        .action-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; padding: 4px; }
    </style>
</head>
<body>
    <div class="v-tag">VERSIO 33.1 (LASKETTU-SORT)</div>
    <div id="auth-section">
        <h1>KULJETUSKIRJA</h1>
        <button class="btn-login" id="btnLogin">KIRJAUDU SISÄÄN</button>
    </div>
    <div id="app-content">
        <div class="top-bar"><span id="userEmail"></span><button id="btnLogout" style="background:none; color:inherit; border:none; text-decoration:underline;">Ulos</button></div>
        <textarea id="msgInput" placeholder="Liitä WhatsApp-viesti..."></textarea>
        <div id="editFields" class="edit-fields">
            <input type="text" id="editDate" placeholder="Pvm (esim. 23.4.)">
            <input type="text" id="editYear" placeholder="Vuosi (esim. 2026)">
            <input type="text" id="editTime" placeholder="Klo">
            <input type="text" id="editPrice" placeholder="Hinta">
        </div>
        <button class="btn-add" id="btnAdd">TALLENNA TILAUS</button>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Pvm/Klo</th><th>Nouto / Kohde</th><th>Asiakas</th><th>Hinta</th><th>Lasku</th><th>Huomio</th><th></th></tr></thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBVPk5FmqbVmirWpjnTQswfNDoUK2SoWzs",
        authDomain: "jsailing-f716c.firebaseapp.com",
        projectId: "jsailing-f716c",
        storageBucket: "jsailing-f716c.firebasestorage.app",
        messagingSenderId: "543523103696",
        appId: "1:543523103696:web:439a312efa6aec398a8fd5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentLogs = [];
    let editId = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('userEmail').innerText = user.email;
            startListening();
        } else {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('app-content').style.display = 'none';
        }
    });

    document.getElementById('btnLogin').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btnLogout').onclick = () => signOut(auth);

    function startListening() {
        onSnapshot(query(collection(db, "taksitulot")), (snapshot) => {
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';
            currentLogs = [];
            snapshot.forEach(d => currentLogs.push({id: d.id, ...d.data()}));

            // UUSI LAJITTELU: Luodaan vertailukelpoinen merkkijono YYYY-MM-DD-HH:MM
            currentLogs.sort((a, b) => {
                const getSortKey = (item) => {
                    const [d, m] = (item.date || "01.01.").split('.');
                    const y = item.year || "2026";
                    const t = (item.time || "00:00").replace('.', ':');
                    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}-${t}`;
                };
                return getSortKey(b).localeCompare(getSortKey(a));
            });

            let lastDateStr = "";
            const now = new Date();
            const todayStr = `${now.getDate()}.${now.getMonth()+1}.`;

            currentLogs.forEach(r => {
                // Tunnistetaan tulevat ajot vertaamalla päivämäärää
                const isFuture = r.date === todayStr || (parseInt(r.date.split('.')[1]) > now.getMonth()+1) || (parseInt(r.date.split('.')[1]) === now.getMonth()+1 && parseInt(r.date.split('.')[0]) >= now.getDate());
                const rowClass = isFuture ? 'row-future' : 'row-past';
                
                let separator = (lastDateStr !== "" && r.date !== lastDateStr) ? "day-separator" : "";
                lastDateStr = r.date;

                const tr = document.createElement('tr');
                tr.className = `${rowClass} ${separator}`;
                tr.innerHTML = `
                    <td><b>${r.date}${r.year ? r.year : ''}</b><br>${r.time}</td>
                    <td><small>N:</small> ${r.from}<br><small>K:</small> ${r.to}</td>
                    <td>${r.customer}<br><small>${r.phone || ''}</small></td>
                    <td><span class="price-tag">${r.price}€</span><br><small>${r.type}</small></td>
                    <td>${r.billing || '—'}</td>
                    <td><small>${r.notes}</small></td>
                    <td>
                        <button class="action-btn" onclick="window.prepareEdit('${r.id}')">✎</button>
                        <button class="action-btn" onclick="window.deleteItem('${r.id}')">✕</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        });
    }

    window.prepareEdit = (id) => {
        const item = currentLogs.find(l => l.id === id);
        if(!item) return;
        editId = id;
        document.getElementById('editFields').style.display = 'grid';
        document.getElementById('editDate').value = item.date;
        document.getElementById('editYear').value = item.year || "2026";
        document.getElementById('editTime').value = item.time;
        document.getElementById('editPrice').value = item.price;
        document.getElementById('msgInput').value = `Nouto: ${item.from}\nKohde: ${item.to}\nAsiakas: ${item.customer}\nPuh: ${item.phone}\nHuomio: ${item.notes}`;
        document.getElementById('btnAdd').innerText = "PÄIVITÄ TILAUS";
        document.getElementById('btnAdd').classList.add('btn-update');
        window.scrollTo(0,0);
    };

    window.deleteItem = (id) => { if(confirm("Poistetaanko?")) deleteDoc(doc(db, "taksitulot", id)); };

    document.getElementById('btnAdd').onclick = async () => {
        const text = document.getElementById('msgInput').value;
        if(!text) return;
        const lines = text.split('\n').map(l => l.trim());
        
        let pvm = editId ? document.getElementById('editDate').value : (text.match(/(\d{1,2})\.(\d{1,2})/) ? text.match(/(\d{1,2})\.(\d{1,2})/)[0] + "." : "23.4.");
        let vuosi = editId ? document.getElementById('editYear').value : "2026";
        let klo = editId ? document.getElementById('editTime').value : (text.match(/(\d{1,2})[.:](\d{2})/) ? text.match(/(\d{1,2})[.:](\d{2})/)[0] : "00:00");
        let hinta = editId ? document.getElementById('editPrice').value : (text.match(/(?<!\d)(\d{1,3})\s*[e€]/i) ? text.match(/(?<!\d)(\d{1,3})\s*[e€]/i)[1] : "0");

        const data = {
            date: pvm,
            year: vuosi,
            time: klo,
            from: lines.find(l => l.toLowerCase().includes('nouto') || l.toLowerCase().includes('lähtö'))?.split(':').pop().trim() || lines[0],
            to: lines.find(l => l.toLowerCase().includes('kohde') || l.toLowerCase().includes('meno'))?.split(':').pop().trim() || lines[1],
            customer: lines.find(l => l.toLowerCase().includes('kyytiin') || l.toLowerCase().includes('nimi'))?.split(':').pop().trim() || '—',
            phone: text.match(/(\+?\d[\d\s-]{8,15})/)?.[0] || '—',
            price: hinta,
            type: text.toLowerCase().includes('vip') ? 'VIP' : 'Normaali',
            notes: lines.find(l => ['odotus','huomio','mittari'].some(k => l.toLowerCase().includes(k))) || '—',
            billing: text.toLowerCase().includes('lasku') ? 'Lasku' : '—',
            driveTimestamp: Date.now() // Käytetään vain muokkauksen seurantaan
        };

        if(editId) {
            await updateDoc(doc(db, "taksitulot", editId), data);
            editId = null;
            document.getElementById('editFields').style.display = 'none';
            document.getElementById('btnAdd').innerText = "TALLENNA TILAUS";
            document.getElementById('btnAdd').classList.remove('btn-update');
        } else {
            await addDoc(collection(db, "taksitulot"), data);
        }
        document.getElementById('msgInput').value = '';
    };
</script>
</body>
</html>
